<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mini Rocket League 3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }
    body{
      margin:0; overflow:hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #0d1117 0, #020308 60%);
      color:#fff;
    }
    #hud{
      position:absolute; left:12px; top:12px; z-index:10;
      background: rgba(4, 8, 20, 0.75);
      padding: 12px 14px; border-radius: 12px;
      backdrop-filter: blur(6px);
      max-width: 520px; font-size: 13px; line-height: 1.55;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #hud h1{
      margin:0 0 6px;
      font-size: 15px; letter-spacing: 0.08em;
      text-transform: uppercase; color:#9ad9ff;
    }
    #hud .controls{ white-space: pre-line; opacity: 0.95; }

    #countdown{
      position:absolute; z-index:20;
      top:50%; left:50%;
      transform: translate(-50%, -50%) scale(0.9);
      font-size:80px; font-weight:900; letter-spacing:0.04em;
      color:#fff; text-shadow:0 0 20px rgba(0,0,0,0.8);
      padding:12px 26px; border-radius:18px;
      background: rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(5px);
      opacity:0; pointer-events:none;
      transition: opacity 0.15s ease-out, transform 0.15s ease-out;
    }
    #goalBanner{
      position:absolute; z-index:19;
      top:50%; left:50%;
      transform: translate(-50%, -50%) scale(0.9);
      font-size:70px; font-weight:900; letter-spacing:0.12em;
      color:#ffeec2; text-shadow:0 0 30px rgba(0,0,0,0.9);
      padding:14px 40px; border-radius:24px;
      background: radial-gradient(circle at top, rgba(255,184,77,0.9), rgba(255,94,58,0.85));
      border:1px solid rgba(255,255,255,0.35);
      box-shadow:0 0 35px rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      opacity:0; pointer-events:none;
      text-transform: uppercase;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    }

    #goalBanner #goalText{
      line-height: 1;
    }
    #goalBanner #goalSpeed{
      margin-top: 10px;
      font-size: 18px;
      letter-spacing: 0.08em;
      opacity: 0.92;
      text-shadow: 0 0 18px rgba(0,0,0,0.65);
    }
    #overtimeBanner{
      position:absolute; z-index:19;
      top:50%; left:50%;
      transform: translate(-50%, -50%) scale(0.9);
      font-size:60px; font-weight:900; letter-spacing:0.18em;
      color:#e3f3ff; text-shadow:0 0 26px rgba(0,0,0,0.9);
      padding:12px 36px; border-radius:22px;
      background: radial-gradient(circle at top, rgba(76,175,255,0.95), rgba(0,68,255,0.85));
      border:1px solid rgba(255,255,255,0.4);
      box-shadow:0 0 35px rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      opacity:0; pointer-events:none;
      text-transform: uppercase;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    }

    #scoreboard{
      position:absolute; top:8px; left:50%;
      transform: translateX(-50%);
      z-index:15;
      display:flex; align-items:center; gap:8px;
      font-weight:800;
      text-shadow: 0 0 8px rgba(0,0,0,0.7);
      letter-spacing:0.08em;
      user-select:none;
    }
    #scoreboard .teamBox{
      min-width:70px; padding:6px 10px; border-radius:999px;
      display:flex; justify-content:center; align-items:center;
      font-size:18px;
      border:1px solid rgba(255,255,255,0.4);
    }
    #scoreboard .blueTeam{ background: linear-gradient(135deg, #1f6bff, #34b3ff); }
    #scoreboard .orangeTeam{ background: linear-gradient(135deg, #ff8a3d, #ffcd3c); }
    #scoreboard .timerBox{
      min-width:110px; text-align:center; font-size:20px;
      border-radius:12px; padding:4px 10px;
      background: rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.4);
    }

    #speedHUD{
      position:fixed; bottom:18px; left:18px; z-index:2000;
      font-size:14px; font-weight:600; color:#fff;
      text-shadow:0 0 6px rgba(0,0,0,0.7);
      line-height:1.4;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px; border-radius: 10px;
      border:1px solid rgba(255,255,255,0.18);
      user-select:none;
    }

    #fadeOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,0);
      z-index:30;
      pointer-events:none;
    }

    #endScreen{
      position:fixed; inset:0; z-index:31;
      pointer-events:none; opacity:0;
      transition: opacity 0.25s ease-out;
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 6vw; gap: 20px;
    }
    #endScreen.visible{ opacity:1; pointer-events:auto; }

    #winnerLeft{
      width: 40%;
      display:flex; flex-direction:column;
      align-items:flex-start; justify-content:center;
      user-select:none;
    }
    #winnerText{
      font-size: 44px; font-weight: 950;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(0,0,0,0.85);
      margin:0;
    }
    #endRight{
      width: 50%;
      display:flex; justify-content:flex-end; align-items:center;
    }
    #endPanel{
      text-align:center;
      padding: 18px 18px; border-radius: 18px;
      background: rgba(10,10,17,0.55);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      min-width: 230px;
      opacity: 0;
      transition: opacity 0.25s ease-out;
    }
    #endPanel.showButtons{ opacity: 1; }
    #endPanel .buttons{ display:flex; justify-content:center; gap:10px; }
    #endPanel button{
      padding: 7px 18px; border-radius: 999px;
      border:0; cursor:pointer;
      font-weight:700; font-size: 13px;
    }
    #playAgainBtn{
      background: linear-gradient(135deg, #2bffa4, #06d6ff);
      color:#02151a;
    }
    #menuBtn{
      background: rgba(255,255,255,0.08);
      color:#e4f4ff;
      border:1px solid rgba(255,255,255,0.16);
    }

    #mainMenu{
      position:fixed; inset:0; z-index:40;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle at top, rgba(10,20,40,0.95), rgba(2,3,8,0.98));
    }
    #menuPanel{
      text-align:center;
      padding: 26px 34px; border-radius: 24px;
      background: rgba(4, 8, 20, 0.9);
      border:1px solid rgba(255,255,255,0.22);
      box-shadow:0 0 45px rgba(0,0,0,0.85);
    }
    #menuTitle{
      font-size: 28px;
      margin-bottom: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color:#9ad9ff;
    }
    #soloButton{
      padding: 8px 24px; border-radius: 999px;
      border:0; cursor:pointer;
      font-weight: 800; font-size: 14px;
      background: linear-gradient(135deg, #2bffa4, #06d6ff);
      color:#02151a;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    #soloButton:active{ transform: translateY(1px); }
  
    #timeControl{
      position:absolute; right:12px; top:64px; z-index:18;
      background: rgba(4, 8, 20, 0.75);
      padding: 10px 12px; border-radius: 12px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 260px;
      display:none;
      user-select:none;
    }
    #timeControl .row{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color:#9ad9ff;
    }
    #timeControl .value{
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color:#ffffff;
      text-transform:none;
      opacity:0.95;
    }
    #timeControl input[type="range"]{
      width: 100%;
      margin: 6px 0 10px;
    }
    #timeControl .presets{
      display:flex; flex-wrap:wrap; gap:6px;
    }
    #timeControl .presets button{
      flex: 1 1 auto;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color:#e4f4ff;
      font-weight: 800;
      font-size: 12px;
      cursor:pointer;
    }
    #timeControl .presets button:active{ transform: translateY(1px); }

    /* --- Minimap --- */
    #minimap{
      position:fixed; bottom:18px; right:18px; z-index:2000;
      width:130px; height:185px;
      background: rgba(4,8,20,0.75);
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      overflow:hidden;
      user-select:none;
    }
    #minimap canvas{ display:block; width:100%; height:100%; }

    /* --- Ball offscreen arrow --- */
    #ballArrow{
      position:fixed; z-index:2001;
      width:0; height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-bottom:22px solid #ffe066;
      filter: drop-shadow(0 0 6px rgba(255,224,102,0.7));
      pointer-events:none;
      opacity:0;
      transition: opacity 0.15s;
    }

    #scoreboard .teamLabel{
      font-size:9px; letter-spacing:0.12em;
      text-transform:uppercase; opacity:0.75;
      line-height:1;
    }

    .menuBtn{
      display:inline-block;
      padding: 8px 22px; border-radius: 999px;
      border:1px solid rgba(255,255,255,0.22);
      cursor:pointer;
      font-weight: 800; font-size: 13px;
      background: rgba(255,255,255,0.08);
      color:#e4f4ff;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      transition: background 0.15s;
    }
    .menuBtn:hover{ background: rgba(255,255,255,0.14); }
    .menuBtn:active{ transform: translateY(1px); }
    .menuBtn.accent{
      background: linear-gradient(135deg, #2bffa4, #06d6ff);
      color:#02151a; border:0;
    }
    .menuBtn.small{ font-size:11px; padding:6px 14px; }

    #mpButtons{
      display:flex; gap:8px; justify-content:center;
      margin-top:10px;
    }
    #hostInfo{
      display:none; margin-top:14px; text-align:center;
    }
    #hostInfo .roomLabel{
      font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
      opacity:0.6; margin-bottom:4px;
    }
    #roomCodeDisplay{
      font-size:36px; font-weight:900; letter-spacing:0.4em;
      color:#2bffa4; text-shadow:0 0 18px rgba(43,255,164,0.4);
      font-family: monospace;
    }
    #hostInfo .roomSub{
      font-size:11px; opacity:0.55; margin-top:4px;
    }
    #joinPanel{
      display:none; margin-top:14px; text-align:center;
    }
    #roomInput{
      width:140px; padding:8px 12px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color:#fff; font-size:22px; font-weight:900;
      letter-spacing:0.35em; text-align:center;
      text-transform:uppercase; outline:none;
      font-family: monospace;
    }
    #roomInput::placeholder{
      font-size:12px; letter-spacing:0.12em; opacity:0.4;
    }
    #roomInput:focus{ border-color: rgba(43,255,164,0.5); }
    #joinConfirmBtn{ margin-left:8px; }

    #mpStatus{
      display:none; margin-top:10px;
      font-size:12px; letter-spacing:0.06em;
      color:#9ad9ff; opacity:0.85;
      min-height:18px;
    }
    #mpStatus.error{ color:#ff6b6b; }
    #mpBackBtn{ display:none; margin-top:10px; }

    /* Multiplayer leave button in-game */
    #leaveBtn{
      position:absolute; top:12px; right:12px; z-index:18;
      padding:6px 14px; border-radius:999px;
      border:1px solid rgba(255,100,100,0.3);
      background: rgba(255,60,60,0.15);
      color:#ff9999; font-weight:700; font-size:11px;
      cursor:pointer; text-transform:uppercase;
      letter-spacing:0.08em;
      display:none;
    }
    #leaveBtn:hover{ background: rgba(255,60,60,0.3); }

    #scoreboard .teamBox.myTeam{
      box-shadow: 0 0 0 2px rgba(255,255,255,0.6), 0 0 12px rgba(255,255,255,0.2);
    }

    #soundButton{
      margin-top: 12px;
      padding: 8px 24px; border-radius: 999px;
      border:1px solid rgba(255,255,255,0.22);
      cursor:pointer;
      font-weight: 800; font-size: 13px;
      background: rgba(255,255,255,0.08);
      color:#e4f4ff;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    #soundButton:active{ transform: translateY(1px); }

    /* Sound Settings Modal */
    #soundModalOverlay{
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(5px);
    }
    #soundModal{
      width: min(520px, calc(100vw - 28px));
      border-radius: 20px;
      background: rgba(4, 8, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 50px rgba(0,0,0,0.85);
      overflow: hidden;
    }
    #soundModalHeader{
      display:flex;
      align-items:center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    #soundModalHeader h2{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color:#9ad9ff;
    }
    #soundModalClose{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #eaf6ff;
      cursor: pointer;
      font-weight: 900;
      font-size: 16px;
      line-height: 1;
    }
    #soundModalClose:active{ transform: translateY(1px); }

    #soundModalBody{
      padding: 14px 16px 10px;
    }
    .soundRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
    }
    .soundRow:last-child{ border-bottom:0; }
    .soundRow label{
      opacity: 0.92;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-size: 12px;
    }
    .soundRow select{
      width: 210px;
      background: rgba(255,255,255,0.10);
      color: #eaf6ff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      padding: 7px 9px;
      outline: none;
    }
    /* Make dropdown option list readable (many browsers honor this) */
    #soundModal option{
      background: #0a0f1a;
      color: #eaf6ff;
    }
    #soundModalFooter{
      display:flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
    }
    #soundSaveBtn{
      padding: 8px 18px; border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #2bffa4, #06d6ff);
      color:#02151a;
    }
    #soundSaveBtn:active{ transform: translateY(1px); }

  </style>
</head>

<body>
  <div id="mainMenu">
    <div id="menuPanel">
      <div id="menuTitle">MINI ROCKET LEAGUE 3D</div>
      <button id="soloButton">FREE PLAY</button>
      <div id="mpButtons">
        <button id="hostBtn" class="menuBtn">HOST GAME</button>
        <button id="joinBtn" class="menuBtn">JOIN GAME</button>
      </div>
      <div id="hostInfo">
        <div class="roomLabel">ROOM CODE</div>
        <div id="roomCodeDisplay"></div>
        <div class="roomSub">Share this code with a friend</div>
      </div>
      <div id="joinPanel">
        <input id="roomInput" type="text" maxlength="4" placeholder="ENTER CODE" autocomplete="off" spellcheck="false">
        <button id="joinConfirmBtn" class="menuBtn accent">CONNECT</button>
      </div>
      <div id="mpStatus"></div>
      <button id="mpBackBtn" class="menuBtn small">← BACK</button>
      <button id="soundButton">SOUND SETTINGS</button>
    </div>
  </div>

  <div id="hud">
    <h1>CONTROLS</h1>
    <div class="controls" id="controlsText"></div>
  </div>
  <button id="leaveBtn">LEAVE GAME</button>

  <div id="scoreboard">
    <div class="teamBox blueTeam"><div class="teamLabel">BLUE</div><span id="scoreLeftTop">0</span></div>
    <div class="timerBox" id="matchTimer">5:00</div>
    <div class="teamBox orangeTeam"><div class="teamLabel">ORANGE</div><span id="scoreRightTop">0</span></div>
  </div>

  <div id="countdown">3</div>
  <div id="goalBanner"><div id="goalText">GOAL!</div><div id="goalSpeed"></div></div>
  <div id="overtimeBanner">OVERTIME</div>

  <div id="timeControl">
    <div class="row">
      <div>GAME SPEED</div>
      <div class="value" id="timeScaleLabel">1.00×</div>
    </div>
    <input id="timeScaleSlider" type="range" min="0.01" max="5" step="0.01" value="1">
    <div class="presets">
      <button data-scale="0.25">0.25×</button>
      <button data-scale="0.5">0.5×</button>
      <button data-scale="1">1×</button>
      <button data-scale="1.5">1.5×</button>
      <button data-scale="2">2×</button>
      <button data-scale="3">3×</button>
    </div>
  </div>


  <div id="speedHUD">
    <div id="carSpeed">Car: 0.00 km/h</div>
    <div id="ballSpeed">Ball: 0.00 km/h</div>
  </div>

  <div id="minimap"><canvas id="minimapCanvas" width="130" height="185"></canvas></div>
  <div id="ballArrow"></div>
  <div id="fadeOverlay"></div>

  <div id="endScreen">
    <div id="winnerLeft">
      <div id="winnerText">BLUE WINS!</div>
    </div>
    <div id="endRight">
      <div id="endPanel">
        <div class="buttons">
          <button id="playAgainBtn">Play Again</button>
          <button id="menuBtn">Menu</button>
        </div>
      </div>
    </div>
  </div>


  <div id="soundModalOverlay">
    <div id="soundModal">
      <div id="soundModalHeader">
        <h2>Sound Settings</h2>
        <button id="soundModalClose" title="Close">×</button>
      </div>

      <div id="soundModalBody">
        <div class="soundRow">
          
<label for="soundIntro">Intro</label>
          <select id="soundIntro">
            <option value="none">None</option>
            <option value="intro_mii">Mii Channel</option>
            <option value="intro_alia">Alia Intro</option>
            <option value="intro_cocomelon">Cocomelon Intro</option>
            <option value="intro_doors">Doors Elevator Music</option>
            <option value="intro_peppa">Peppa Pig Intro</option>
                      <option value="intro_diddy">DIDDY BLUD</option>
          </select>

        </div>

        <div class="soundRow">
          <label for="soundJump">Jump</label>
          <select id="soundJump">
            <option value="none">None</option>
            <option value="mario">Mario Boing</option>
          </select>
        </div>

        <div class="soundRow">
          
<label for="soundHit">Hit Ball</label>
          <select id="soundHit">
            <option value="none">None</option>
            <option value="hit_punch">Punch</option>
            <option value="hit_weak_punch">Weak Punch</option>
            <option value="hit_strong_punch">Strong Punch</option>
                      <option value="snd_bruh">Bruh</option>
          </select>

        </div>

        <div class="soundRow">
          
<label for="soundGoalpost">Goalpost</label>
          <select id="soundGoalpost">
            <option value="none">None</option>
            <option value="post_peppa">Peppa Pig Fail</option>
            <option value="post_taco">Taco Bell Bong</option>
            <option value="post_bongo">Bongo Hit</option>
                      <option value="snd_bruh">Bruh</option>
                      <option value="snd_rizz">Rizz</option>
                      <option value="snd_wrong">Wrong Answer</option>
          </select>

        </div>

        <div class="soundRow">
          
<label for="soundGoal">Goal</label>
          <select id="soundGoal">
            <option value="none">None</option>
            <option value="goal_explosion">Explosion</option>
            <option value="goal_vineboom">Vine Boom</option>
            <option value="goal_animewow">Anime Wow</option>
                      <option value="snd_ack">ACK</option>
                      <option value="snd_bruh">Bruh</option>
                      <option value="snd_metalpipe">Metal Pipe Clang</option>
                      <option value="snd_yaaay">YAAAAY</option>
                      <option value="snd_yeahboi">Yeah Boiii i i i</option>
                      <option value="snd_yeahheboi">Yeahhe Boi</option>
          </select>

        </div>

        <div class="soundRow">
          
<label for="soundLose">Lose</label>
          <select id="soundLose">
            <option value="none">None</option>
            <option value="sad_violin">Sad Violin</option>
            <option value="spooky_music">Spooky Music</option>
            <option value="sad_meow">Sad Meow Song</option>
            <option value="wawa">Wa Wa Wa WAAAAAA</option>
            <option value="failure">Congratulations, you're a failure</option>
            <option value="price_fail">Price is Right Failure</option>
                      <option value="lose_spongebob">Spongebob Fail</option>
                      <option value="snd_bruh">Bruh</option>
                      <option value="snd_babylaugh">Baby Laughing</option>
                      <option value="snd_romance">Romance</option>
                      <option value="snd_socialcredit">-999 Social Credit Siren</option>
          </select>

        </div>

    // --- Multiplayer menu flow ---
    function showMpStatus(msg, isError) {

    function generateRoomCode() {
      const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 4; i++) code += c[Math.floor(Math.random() * c.length)];
      return code;
    }

    function connectAbly() {
      return new Promise((resolve, reject) => {
        ablyClient = new Ably.Realtime({ key: ABLY_KEY, echoMessages: false });
        ablyClient.connection.on("connected", () => resolve());
        ablyClient.connection.on("failed", (err) => reject(err));
        setTimeout(() => reject(new Error("Connection timeout")), 8000);
      });
    }

    async function hostGame() {
      mpButtonsEl.style.display = "none";
      soloButton.style.display = "none";
      soundButton.style.display = "none";
      mpBackBtn.style.display = "inline-block";
      showMpStatus("Connecting...");

      try {
        await connectAbly();
        roomCode = generateRoomCode();
        gameChannel = ablyClient.channels.get("rl-" + roomCode);

        roomCodeDisplayEl.textContent = roomCode;
        hostInfoEl.style.display = "block";
        showMpStatus("Waiting for opponent...");
        isHost = true;

        gameChannel.subscribe("c", (msg) => {
          if (!peerConnected) {
            peerConnected = true;
            showMpStatus("Opponent connected! Starting...");
            setTimeout(() => startMultiplayerMatch(), 1200);
          }
          opponentTargetState = msg.data;
        });

        gameChannel.subscribe("peerJoin", () => {
          if (!peerConnected) {
            peerConnected = true;
            showMpStatus("Opponent connected! Starting...");
            setTimeout(() => startMultiplayerMatch(), 1200);
          }
        });

      } catch (e) {
        showMpStatus("Connection failed: " + e.message, true);
      }
    }

    async function joinGame() {
      const code = roomInputEl.value.toUpperCase().trim();
      if (code.length !== 4) { showMpStatus("Enter a 4-character code", true); return; }

      mpButtonsEl.style.display = "none";
      soloButton.style.display = "none";
      soundButton.style.display = "none";
      joinPanelEl.style.display = "none";
      showMpStatus("Connecting...");

      try {
        await connectAbly();
        roomCode = code;
        isHost = false;
        gameChannel = ablyClient.channels.get("rl-" + roomCode);

        gameChannel.subscribe("h", (msg) => {
          const data = msg.data;
          if (data.c) opponentTargetState = data.c;
          if (data.b) ballTargetState = data.b;
          if (data.t) {
            matchTime = data.t.mt;
            isOvertime = !!data.t.ot;
            overtimeTime = data.t.ott || 0;
            updateTimerDisplay();
          }
          if (data.s) {
            scoreLeft = data.s[0]; scoreRight = data.s[1];
            updateScore();
          }
          if (!peerConnected) peerConnected = true;
        });

        gameChannel.subscribe("gameEvent", (msg) => {
          handleNetworkGameEvent(msg.data);
        });

        // Notify host
        gameChannel.publish("peerJoin", { t: Date.now() });
        showMpStatus("Connected! Waiting for host to start...");

      } catch (e) {
        showMpStatus("Connection failed: " + e.message, true);
      }
    }

    function startMultiplayerMatch() {
      isMultiplayer = true;
      createOpponentCar();

      // Highlight your team on scoreboard
      const blueBox = document.querySelector("#scoreboard .blueTeam");
      const orangeBox = document.querySelector("#scoreboard .orangeTeam");
      if (blueBox) blueBox.classList.toggle("myTeam", isHost);
      if (orangeBox) orangeBox.classList.toggle("myTeam", !isHost);

      stopAllSounds();
      mainMenuEl.style.display = "none";
      if (soundModalOverlay) { stopPreviewSound(); soundModalOverlay.style.display = "none"; }

      leaveBtnEl.style.display = "block";

      startMatchCommon();

      // Host subscribes to client state if not already
      if (isHost) {
        // Already subscribed in hostGame
        // Send game start event
        if (gameChannel) gameChannel.publish("gameEvent", { type: "start" });
      }
    }

    function disconnectMultiplayer() {
      if (gameChannel) {
        try { gameChannel.detach(); } catch(e) {}
        gameChannel = null;
      }
      if (ablyClient) {
        try { ablyClient.close(); } catch(e) {}
        ablyClient = null;
      }
      isMultiplayer = false;
      isHost = false;
      peerConnected = false;
      roomCode = "";
      opponentTargetState = null;
      ballTargetState = null;
      netTickTimer = 0;

      if (opponentCar) {
        scene.remove(opponentCar);
        opponentCar = null;
      }
      opBoostTrailL = null;
      opBoostTrailR = null;

      leaveBtnEl.style.display = "none";
    }

    function handleNetworkGameEvent(data) {
      if (!data || !data.type) return;

      if (data.type === "start") {
        // Can come from either player (initial start or Play Again)
        isMultiplayer = true;
        createOpponentCar(); // guard prevents duplicate
        stopAllSounds();
        mainMenuEl.style.display = "none";
        leaveBtnEl.style.display = "block";
        startMatchCommon();
      }

      if (data.type === "goal") {
        if (data.team === "orange") scoreRight = data.sR;
        else scoreLeft = data.sL;
        scoreLeft = data.sL; scoreRight = data.sR;
        updateScore();
        if (goalTextEl) goalTextEl.textContent = data.team === "orange" ? "ORANGE GOAL!" : "BLUE GOAL!";
        goalBannerEl.style.background = data.team === "orange"
          ? "radial-gradient(circle at top, rgba(255,184,77,0.9), rgba(255,94,58,0.85))"
          : "radial-gradient(circle at top, rgba(77,150,255,0.9), rgba(58,94,255,0.85))";
        startGoalBanner();
        playSound("goal");
      }

      if (data.type === "countdown") {
        startCountdown();
      }

      if (data.type === "overtime") {
        isOvertime = true;
        overtimeTime = 0;
        overtimeBannerTime = 2.0;
        overtimeBannerEl.style.opacity = 1;
        overtimeBannerEl.style.transform = "translate(-50%, -50%) scale(1)";
        resetPositions(false, false);
        updateTimerDisplay();
      }

      if (data.type === "end") {
        scoreLeft = data.sL; scoreRight = data.sR;
        updateScore();
        endMatch();
      }

      if (data.type === "timer") {
        matchTime = data.mt;
        isOvertime = data.ot;
        overtimeTime = data.ott || 0;
        updateTimerDisplay();
      }

      if (data.type === "reset") {
        resetPositions(data.full, data.countdown);
      }
    }

    // --- Send state functions (ONE message per tick) ---
    let timerSyncCounter = 0;

    function sendHostState() {
      if (!gameChannel || !peerConnected) return;
      const c = car;
      const msg = {
        c: {
          p: [+c.position.x.toFixed(2), +c.position.y.toFixed(2), +c.position.z.toFixed(2)],
          q: [+c.quaternion.x.toFixed(3), +c.quaternion.y.toFixed(3), +c.quaternion.z.toFixed(3), +c.quaternion.w.toFixed(3)],
          v: [+carVelocity.x.toFixed(1), +carVelocity.y.toFixed(1), +carVelocity.z.toFixed(1)],
          h: +carHeading.toFixed(3), g: onGround ? 1 : 0, b: isBoostingVisual ? 1 : 0
        }
      };
      if (ball && ball.visible) {
        msg.b = {
          p: [+ball.position.x.toFixed(2), +ball.position.y.toFixed(2), +ball.position.z.toFixed(2)],
          v: [+ballVelocity.x.toFixed(1), +ballVelocity.y.toFixed(1), +ballVelocity.z.toFixed(1)]
        };
      }
      // Timer sync every ~3 seconds (every 45 ticks at 15Hz)
      timerSyncCounter++;
      if (timerSyncCounter >= 45) {
        timerSyncCounter = 0;
        msg.t = { mt: +matchTime.toFixed(1), ot: isOvertime ? 1 : 0, ott: +overtimeTime.toFixed(1) };
        msg.s = [scoreLeft, scoreRight];
      }
      try { gameChannel.publish("h", msg); } catch(e) {}
    }

    function sendClientState() {
      if (!gameChannel || !peerConnected) return;
      const c = car;
      try {
        gameChannel.publish("c", {
          p: [+c.position.x.toFixed(2), +c.position.y.toFixed(2), +c.position.z.toFixed(2)],
          q: [+c.quaternion.x.toFixed(3), +c.quaternion.y.toFixed(3), +c.quaternion.z.toFixed(3), +c.quaternion.w.toFixed(3)],
          v: [+carVelocity.x.toFixed(1), +carVelocity.y.toFixed(1), +carVelocity.z.toFixed(1)],
          h: +carHeading.toFixed(3), g: onGround ? 1 : 0, b: isBoostingVisual ? 1 : 0
        });
      } catch(e) {}
    }

    // --- Update opponent car from network (with velocity extrapolation) ---
    function updateOpponentCar(dt) {
      if (!opponentCar || !opponentTargetState) return;
      const t = opponentTargetState;
      const lerpF = Math.min(1, dt * 10);

      // Extrapolate target position using velocity
      const tp = new THREE.Vector3(t.p[0], t.p[1], t.p[2]);
      const tv = new THREE.Vector3(t.v[0], t.v[1], t.v[2]);
      tp.addScaledVector(tv, dt * 0.5); // half-step extrapolation

      opponentCar.position.lerp(tp, lerpF);

      const tq = new THREE.Quaternion(t.q[0], t.q[1], t.q[2], t.q[3]);
      opponentCar.quaternion.slerp(tq, lerpF);

      opponentCarVelocity.set(t.v[0], t.v[1], t.v[2]);
      opponentCarHeading = t.h;
      opponentOnGround = !!t.g;
      opponentIsBoostingVisual = !!t.b;
    }

    // --- Client ball: run local physics + blend toward host state ---
    function updateBallClientPredicted(dt) {
      if (!ball) return;

      // Run local ball physics (same as host)
      ballVelocity.y += gravity * dt;
      ball.position.addScaledVector(ballVelocity, dt);

      // Ground bounce
      if (ball.position.y - ballRadius <= 0) {
        ball.position.y = ballRadius;
        if (ballVelocity.y < 0) ballVelocity.y *= -0.85;
      }

      const halfW = fieldWidth / 2;
      const halfL = fieldLength / 2;

      // Side walls
      if (ball.position.x - ballRadius < -halfW) { ball.position.x = -halfW + ballRadius; if (ballVelocity.x < 0) ballVelocity.x *= -0.85; }
      if (ball.position.x + ballRadius >  halfW) { ball.position.x =  halfW - ballRadius; if (ballVelocity.x > 0) ballVelocity.x *= -0.85; }

      // Goal mouth
      const inMouthX = Math.abs(ball.position.x) <= (goalWidth/2 - ballRadius);
      const inMouthY = (ball.position.y >= ballRadius) && (ball.position.y <= (goalHeight - ballRadius));
      const inMouth = inMouthX && inMouthY;
      if (!inMouth) {
        if (ball.position.z - ballRadius < -halfL) { ball.position.z = -halfL + ballRadius; if (ballVelocity.z < 0) ballVelocity.z *= -0.85; }
        if (ball.position.z + ballRadius >  halfL) { ball.position.z =  halfL - ballRadius; if (ballVelocity.z > 0) ballVelocity.z *= -0.85; }
      }

      ballVelocity.multiplyScalar(Math.pow(0.995, dt * 60));

      // Blend toward host authoritative state
      if (ballTargetState) {
        const t = ballTargetState;
        const hostPos = new THREE.Vector3(t.p[0], t.p[1], t.p[2]);
        const hostVel = new THREE.Vector3(t.v[0], t.v[1], t.v[2]);

        // Smooth correction — blend position and snap velocity
        const correctionF = Math.min(1, dt * 8);
        ball.position.lerp(hostPos, correctionF);
        ballVelocity.lerp(hostVel, correctionF * 1.5);
      }

      // Spin visual
      const horizVel = new THREE.Vector3(ballVelocity.x, 0, ballVelocity.z);
      const speed = horizVel.length();
      if (speed > 0.0001) {
        const dir = horizVel.clone().normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3().crossVectors(dir, up).normalize();
        if (!isNaN(axis.x)) ball.rotateOnAxis(axis, (speed / ballRadius) * dt);
      }

      // Update indicator
      if (ballIndicator) {
        ballIndicator.position.x = ball.position.x;
        ballIndicator.position.z = ball.position.z;
        if (ballIndicatorInner) {
          const heightAboveGround = Math.max(0, ball.position.y - ballRadius);
          const ht = Math.max(0, Math.min(1, 1 - (heightAboveGround / 50)));
          ballIndicatorInner.scale.set(ht, ht, 1);
        }
      }

      updateBallGoalVisual();
      updateGoalpostProximity();
    }
    function updateOpponentBoostTrail(dt) {
      if (!opBoostTrailL || !opBoostTrailR) return;
      const active = opponentIsBoostingVisual;
      const target = active ? 1.6 : 0.0;
      const lf = Math.min(1, dt * 12);

      opBoostTrailL.scale.z += (target - opBoostTrailL.scale.z) * lf;
      opBoostTrailR.scale.z += (target - opBoostTrailR.scale.z) * lf;

      const vis = opBoostTrailL.scale.z > 0.03;
      opBoostTrailL.visible = vis;
      opBoostTrailR.visible = vis;

      if (vis) {
        const pulse = 0.6 + 0.4 * Math.sin(time * 20);
        const intensity = Math.min(1, opBoostTrailL.scale.z / 1.6);
        opBoostTrailL.material.opacity = intensity * 0.8 * pulse;
        opBoostTrailR.material.opacity = intensity * 0.8 * pulse;
      }
    }

    // --- Create opponent car (orange) ---
    function createOpponentCar() {
      if (opponentCar) return; // already created

      const g = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xff8a3d, metalness: 0.8, roughness: 0.25,

      const nose = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.6, 1.8), bodyMat.clone());

      nose.castShadow = true;
      g.add(nose);

      const cabinMat = new THREE.MeshPhysicalMaterial({
        color: 0xffaa44, metalness: 0.2, roughness: 0.05,

      });
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 2.6), cabinMat);
      cabin.position.set(0, 0.9, -0.7);
      g.add(cabin);

      const spoilerMat = new THREE.MeshStandardMaterial({
        color: 0xff6600, metalness: 0.9, roughness: 0.3
      });
      const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.25, 0.8), spoilerMat);
      spoiler.position.set(0, 1.0, -3.1);
      g.add(spoiler);

      const supGeo = new THREE.BoxGeometry(0.15, 0.7, 0.15);
      const sL = new THREE.Mesh(supGeo, spoilerMat);
      sL.position.set(-1.1, 0.7, -2.85);
      const sR = sL.clone(); sR.position.x = 1.1;
      g.add(sL, sR);

      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x101218, metalness: 0.3, roughness: 0.9 });
      const rimMat = new THREE.MeshStandardMaterial({
        color: 0xffcc66, metalness: 1.0, roughness: 0.15,
        emissive: 0xff9933, emissiveIntensity: 0.4
      });
      const wheelGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.6, 18);
      const rimGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.62, 12);

      [[-1.8,-0.3,2.5],[1.8,-0.3,2.5],[-1.8,-0.3,-2.5],[1.8,-0.3,-2.5]].forEach(([x,y,z]) => {
        const tire = new THREE.Mesh(wheelGeo, wheelMat);
        tire.rotation.z = Math.PI/2; tire.position.set(x,y,z);
        tire.castShadow = true; g.add(tire);
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI/2; rim.position.set(x,y,z);
        g.add(rim);
      });

      const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.5 });
      const glow = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.05, 5.2), glowMat);
      glow.position.set(0, -0.35, 0);
      g.add(glow);

      // Boost trails
      const trailMat = new THREE.MeshBasicMaterial({
        color: 0xffc857, transparent: true, opacity: 0.0,
        blending: THREE.AdditiveBlending, depthWrite: false
      });
      const trailGeo = new THREE.BoxGeometry(0.3, 0.3, 3.5);
      opBoostTrailL = new THREE.Mesh(trailGeo, trailMat.clone());
      opBoostTrailR = new THREE.Mesh(trailGeo, trailMat.clone());
      opBoostTrailL.position.set(-0.9, -0.1, -3.5);
      opBoostTrailR.position.set(0.9, -0.1, -3.5);
      opBoostTrailL.scale.z = 0; opBoostTrailR.scale.z = 0;
      opBoostTrailL.visible = false; opBoostTrailR.visible = false;
      g.add(opBoostTrailL, opBoostTrailR);

      g.position.set(0, 1, fieldLength / 4);
      opponentCar = g;
      scene.add(opponentCar);
    }

    // --- Minimap ---
    const minimapCanvas = document.getElementById("minimapCanvas");
    const minimapCtx = minimapCanvas ? minimapCanvas.getContext("2d") : null;
    const minimapEl = document.getElementById("minimap");

    // --- Ball offscreen arrow ---
    const ballArrowEl = document.getElementById("ballArrow");

    // --- Particle system ---
    const particles = [];
    const MAX_PARTICLES = 300;
    const particleGeo = new THREE.SphereGeometry(0.15, 6, 6);

    function spawnParticles(pos, color, count, speedMult, lifeMult) {
      for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
        const mat = new THREE.MeshBasicMaterial({
          color: color,
          transparent: true,
          opacity: 1.0,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(particleGeo, mat);
        mesh.position.copy(pos);
        const scale = 0.3 + Math.random() * 0.8;
        mesh.scale.setScalar(scale);
        scene.add(mesh);
        const vel = new THREE.Vector3(
          (Math.random() - 0.5) * speedMult,
          Math.random() * speedMult * 0.8 + 2,
          (Math.random() - 0.5) * speedMult
        );
        const life = (0.4 + Math.random() * 0.6) * (lifeMult || 1);
        particles.push({ mesh, vel, life, maxLife: life, gravity: -12 });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.material.dispose();
          particles.splice(i, 1);
          continue;
        }
        p.vel.y += p.gravity * dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        const t = p.life / p.maxLife;
        p.mesh.material.opacity = t * t;
        p.mesh.scale.setScalar(p.mesh.scale.x * (1 - dt * 1.5));
      }
    }

    // --- Screen shake ---
    let shakeIntensity = 0;
    let shakeDuration = 0;
    let shakeTime = 0;
    const shakeOffset = new THREE.Vector3();

    function triggerShake(intensity, duration) {
      shakeIntensity = Math.max(shakeIntensity, intensity);
      shakeDuration = Math.max(shakeDuration, duration);
      shakeTime = 0;
    }

    function updateShake(dt) {
      if (shakeDuration <= 0) { shakeOffset.set(0,0,0); return; }
      shakeTime += dt;
      if (shakeTime >= shakeDuration) {
        shakeDuration = 0;
        shakeIntensity = 0;
        shakeOffset.set(0,0,0);
        return;
      }
      const decay = 1 - (shakeTime / shakeDuration);
      const i = shakeIntensity * decay;
      shakeOffset.set(
        (Math.random() - 0.5) * 2 * i,
        (Math.random() - 0.5) * 2 * i,
        (Math.random() - 0.5) * 2 * i
      );
    }

    // --- Ball trail ---

    function createBallTrail() {
      ballTrailPositions = new Float32Array(BALL_TRAIL_LENGTH * 3);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(ballTrailPositions, 3));
      geo.setDrawRange(0, 0);
      const mat = new THREE.LineBasicMaterial({
        color: 0xffe066,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      ballTrailLine = new THREE.Line(geo, mat);
      ballTrailLine.frustumCulled = false;
      scene.add(ballTrailLine);
    }

    let ballTrailTimer = 0;
    function updateBallTrail(dt) {
      if (!ballTrailLine || !ball || !ball.visible) {
        if (ballTrailLine) ballTrailLine.geometry.setDrawRange(0, 0);
        return;
      }
      ballTrailTimer += dt;
      if (ballTrailTimer >= 0.02) {
        ballTrailTimer = 0;
        ballTrailPoints.push(ball.position.clone());
        if (ballTrailPoints.length > BALL_TRAIL_LENGTH) ballTrailPoints.shift();
      }
      const n = ballTrailPoints.length;
      for (let i = 0; i < n; i++) {
        const idx = i * 3;
        ballTrailPositions[idx]   = ballTrailPoints[i].x;
        ballTrailPositions[idx+1] = ballTrailPoints[i].y;
        ballTrailPositions[idx+2] = ballTrailPoints[i].z;
      }
      ballTrailLine.geometry.attributes.position.needsUpdate = true;
      ballTrailLine.geometry.setDrawRange(0, n);
      // Color based on ball speed
      const spd = ballVelocity.length();
      if (spd > 40) ballTrailLine.material.color.setHex(0xff6644);
      else if (spd > 20) ballTrailLine.material.color.setHex(0xffaa44);

    // --------- Stadium ----------
    function createCloudTexture(size=512) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, 0, size);
      grad.addColorStop(0, "#6fc6ff");
      grad.addColorStop(0.55, "#60b7ff");
      grad.addColorStop(1, "#3b79c8");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      function rand2(x, y) {
        const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
        return s - Math.floor(s);
      }
      function smoothstep(t){ return t*t*(3-2*t); }
      function lerp(a,b,t){ return a + (b-a)*t; }

      function valueNoise(x, y) {
        const xi = Math.floor(x), yi = Math.floor(y);
        const xf = x - xi, yf = y - yi;
        const v00 = rand2(xi, yi);
        const v10 = rand2(xi+1, yi);
        const v01 = rand2(xi, yi+1);
        const v11 = rand2(xi+1, yi+1);
        const u = smoothstep(xf);
        const v = smoothstep(yf);
        const x1 = lerp(v00, v10, u);
        const x2 = lerp(v01, v11, u);
        return lerp(x1, x2, v);
      }

      const img = ctx.getImageData(0,0,size,size);
      const data = img.data;

      for (let y=0; y<size; y++){
        for (let x=0; x<size; x++){
          const nx = x / size;
          const ny = y / size;

          let n = 0;
          let amp = 1.0;
          let freq = 2.0;
          for (let o=0; o<5; o++){
            n += amp * valueNoise(nx*freq*6.0, ny*freq*6.0);
            amp *= 0.5;
            freq *= 2.0;
          }

          const heightMask = Math.max(0, 1.0 - ny*1.15);
          let c = n * 0.9 + heightMask*0.25;
          c = (c - 0.55) / 0.25;
          c = Math.max(0, Math.min(1, c));
          c = c*c*(3-2*c);
          c *= 0.35;

          const i = (y*size + x)*4;
          const alpha = Math.floor(c * 110);

          data[i+0] = lerp(data[i+0], 255, c);
          data[i+1] = lerp(data[i+1], 255, c);
          data[i+2] = lerp(data[i+2], 255, c);
          data[i+3] = 255;

          data[i+0] = Math.min(255, data[i+0] + alpha*0.06);
          data[i+1] = Math.min(255, data[i+1] + alpha*0.06);
          data[i+2] = Math.min(255, data[i+2] + alpha*0.06);
        }
      }

      ctx.putImageData(img, 0, 0);

      const tmp = document.createElement("canvas");
      tmp.width = tmp.height = size;
      const tctx = tmp.getContext("2d");
      tctx.clearRect(0,0,size,size);
      tctx.globalAlpha = 0.65;
      tctx.drawImage(canvas, 0, 0, size/2, size/2);
      tctx.globalAlpha = 1;

      ctx.clearRect(0,0,size,size);
      ctx.drawImage(tmp, 0, 0, size/2, size/2, 0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2.2, 1.4);
      tex.offset.set(0, 0);
      tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
      return tex;
    }

    function createStadium() {
      stadium.skyTex = createCloudTexture(512);

      const skyGeo = new THREE.SphereGeometry(520, 48, 32);
      stadium.skyMat = new THREE.MeshBasicMaterial({ map: stadium.skyTex, side: THREE.BackSide });
      const sky = new THREE.Mesh(skyGeo, stadium.skyMat);
      scene.add(sky);

      const bowlGeo = new THREE.CylinderGeometry(260, 300, 120, 64, 1, true);
      const bowlMat = new THREE.MeshStandardMaterial({
        color: 0x0b1a2b, metalness: 0.2, roughness: 0.85, side: THREE.BackSide

      const bowl = new THREE.Mesh(bowlGeo, bowlMat);

    // Invisible but solid arena boundary walls with goal openings
    function createWallsInvisible() {
      const invisibleMat = new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.0, depthWrite: false
      });
      const thickness = 1.2;

      // Helper: create a wireframe visual clone for any collider
      function addHitboxVisualFor(mesh) {
        const wf = new THREE.Mesh(
          mesh.geometry,
          new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true })
        );
        wf.position.copy(mesh.position);
        wf.quaternion.copy(mesh.quaternion);
        wf.scale.copy(mesh.scale);
        wf.visible = false;
        scene.add(wf);
        goalHitboxVisuals.push(wf);
      }

      // Side walls (full length)
      const sideGeo = new THREE.BoxGeometry(thickness, wallHeight, fieldLength + thickness*2);
      const leftWall = new THREE.Mesh(sideGeo, invisibleMat);
      leftWall.position.set(-fieldWidth/2 - thickness/2, wallHeight/2, 0);
      scene.add(leftWall);
      cameraColliders.push(leftWall);
      // ✅ NEW: add side wall hitbox wireframe too
      addHitboxVisualFor(leftWall);

      const rightWall = leftWall.clone();
      rightWall.position.x *= -1;
      scene.add(rightWall);
      cameraColliders.push(rightWall);
      // ✅ NEW: add side wall hitbox wireframe too
      addHitboxVisualFor(rightWall);

      // End walls: split segments around goal opening
      const zBlue = -fieldLength/2 - thickness/2;
      const zOrange = fieldLength/2 + thickness/2;

      const halfW = fieldWidth / 2;
      const goalHalfW = goalWidth / 2;
      const sideSegW = (halfW - goalHalfW);

      const sideSegGeo = new THREE.BoxGeometry(sideSegW, wallHeight, thickness);
      const topSegGeo = new THREE.BoxGeometry(goalWidth, wallHeight - goalHeight, thickness);

      function addEndWall(zPos) {
        const leftSeg = new THREE.Mesh(sideSegGeo, invisibleMat);
        leftSeg.userData.isEndWallSeg = true;
        leftSeg.position.set(-goalHalfW - sideSegW/2, wallHeight/2, zPos);
        scene.add(leftSeg);
        cameraColliders.push(leftSeg);
        addHitboxVisualFor(leftSeg);

        const rightSeg = leftSeg.clone();
        rightSeg.userData.isEndWallSeg = true;
        rightSeg.position.x = goalHalfW + sideSegW/2;
        scene.add(rightSeg);
        cameraColliders.push(rightSeg);
        addHitboxVisualFor(rightSeg);

        if (wallHeight > goalHeight) {
          const topSeg = new THREE.Mesh(topSegGeo, invisibleMat);
          topSeg.userData.isEndWallSeg = true;
          topSeg.position.set(0, goalHeight + (wallHeight - goalHeight)/2, zPos);
          // ✅ IMPORTANT: tag for camera to optionally ignore near goals
          topSeg.userData.isGoalTopSeg = true;
          scene.add(topSeg);
          cameraColliders.push(topSeg);
          addHitboxVisualFor(topSeg);
        }
      }

      addEndWall(zBlue);
      addEndWall(zOrange);
    }

    function createBallTexture() {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#fdf3b0';
      ctx.fillRect(0, 0, size, size);

      const grad = ctx.createRadialGradient(size * 0.3, size * 0.3, size * 0.1, size * 0.5, size * 0.5, size * 0.6);
      grad.addColorStop(0, 'rgba(255,255,255,0.9)');
      grad.addColorStop(1, 'rgba(255,200,80,0.9)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = 'rgba(80,60,20,0.8)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(size * 0.33, 0); ctx.lineTo(size * 0.33, size);
      ctx.moveTo(size * 0.66, 0); ctx.lineTo(size * 0.66, size);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, size * 0.33); ctx.lineTo(size, size * 0.33);
      ctx.moveTo(0, size * 0.66); ctx.lineTo(size, size * 0.66);
      ctx.stroke();

      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, size * 0.5); ctx.lineTo(size * 0.5, 0);
      ctx.moveTo(size * 0.5, size); ctx.lineTo(size, size * 0.5);
      ctx.stroke();

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1, 1);
      return texture;
    }
