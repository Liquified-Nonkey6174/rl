    function createBallPathLine() {
      const steps = Math.floor(BALL_PATH_SECONDS / BALL_PATH_STEP) + 1;

      ballPathPositions = new Float32Array(steps * 3);
      ballPathPositions3D = new Float32Array(steps * 3);

      // Ground-projected line
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(ballPathPositions, 3));
      geo.setDrawRange(0, steps);

      const mat = new THREE.LineBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.9 });

      ballPathLine = new THREE.Line(geo, mat);
      ballPathLine.frustumCulled = false;
      ballPathLine.visible = false;
      scene.add(ballPathLine);

      // 3D line (true height)
      const geo3 = new THREE.BufferGeometry();
      geo3.setAttribute("position", new THREE.BufferAttribute(ballPathPositions3D, 3));
      geo3.setDrawRange(0, steps);

      const mat3 = new THREE.LineBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.55 });
      ballPathLine3D = new THREE.Line(geo3, mat3);
      ballPathLine3D.frustumCulled = false;
      ballPathLine3D.visible = false;
      scene.add(ballPathLine3D);
    }

    function updateBallPathLine() {
      if (!ballPathLine || !ballPathLine3D || !ballPathPositions || !ballPathPositions3D || !ball) return;

      // Don't show during goal celebration / when ball hidden
      if (goalActive || !ball.visible) {
        ballPathLine.visible = false;
        ballPathLine3D.visible = false;
        return;
      }

      ballPathLine.visible = showBallPath;
      ballPathLine3D.visible = showBallPath;

      if (!showBallPath) return;

      // Predict using a lightweight physics sim (matches main updateBall as closely as practical)
      let p = ball.position.clone();
      let v = ballVelocity.clone();

      const halfW = fieldWidth * 0.5;
      const halfL = fieldLength * 0.5;

      const steps = Math.floor(BALL_PATH_SECONDS / BALL_PATH_STEP) + 1;

      for (let i = 0; i < steps; i++) {
        const idx = i * 3;
        ballPathPositions[idx + 0] = p.x;
        ballPathPositions[idx + 1] = 0.06; // draw slightly above the ground for visibility
        ballPathPositions[idx + 2] = p.z;

        ballPathPositions3D[idx + 0] = p.x;
        ballPathPositions3D[idx + 1] = p.y;
        ballPathPositions3D[idx + 2] = p.z;

        // Step forward
        v.y += gravity * BALL_PATH_STEP;
        p.addScaledVector(v, BALL_PATH_STEP);

        // Ground bounce
        if (p.y - ballRadius <= 0) {
          p.y = ballRadius;
          if (v.y < 0) v.y *= -0.85;
          // simple rolling friction on ground
          v.x *= 0.995;
          v.z *= 0.995;
        }

        // Side walls
        if (p.x - ballRadius < -halfW) { p.x = -halfW + ballRadius; if (v.x < 0) v.x *= -0.85; }
        if (p.x + ballRadius >  halfW) { p.x =  halfW - ballRadius; if (v.x > 0) v.x *= -0.85; }

        // Goal mouth logic (same as updateBall)
        const inMouthX = Math.abs(p.x) <= (goalWidth/2 - ballRadius);
        const inMouthY = (p.y >= ballRadius) && (p.y <= (goalHeight - ballRadius));
        const inMouth = inMouthX && inMouthY;

        // End walls only if not in mouth
        if (!inMouth) {
          if (p.z - ballRadius < -halfL) { p.z = -halfL + ballRadius; if (v.z < 0) v.z *= -0.85; }
          if (p.z + ballRadius >  halfL) { p.z =  halfL - ballRadius; if (v.z > 0) v.z *= -0.85; }
        }

        // Tunnel constraints (approx)
        const zLineBlue = -halfL;
        const zLineOrange = halfL;

        if (p.z < zLineBlue && inMouth) {
          const minZ = zLineBlue - goalDepth + ballRadius;
          const maxZ = zLineBlue - ballRadius;
          const maxXGoal = goalWidth/2 - ballRadius;

          if (p.x < -maxXGoal) { p.x = -maxXGoal; if (v.x < 0) v.x *= -0.7; }
          if (p.x >  maxXGoal) { p.x =  maxXGoal; if (v.x > 0) v.x *= -0.7; }

          const maxYGoal = goalHeight - ballRadius;
          if (p.y > maxYGoal) { p.y = maxYGoal; if (v.y > 0) v.y *= -0.7; }

          if (p.z < minZ) { p.z = minZ; if (v.z < 0) v.z *= -0.7; }
          if (p.z > maxZ) p.z = maxZ;
        }

        if (p.z > zLineOrange && inMouth) {
          const minZ = zLineOrange + ballRadius;
          const maxZ = zLineOrange + goalDepth - ballRadius;
          const maxXGoal = goalWidth/2 - ballRadius;

          if (p.x < -maxXGoal) { p.x = -maxXGoal; if (v.x < 0) v.x *= -0.7; }
          if (p.x >  maxXGoal) { p.x =  maxXGoal; if (v.x > 0) v.x *= -0.7; }

          const maxYGoal = goalHeight - ballRadius;
          if (p.y > maxYGoal) { p.y = maxYGoal; if (v.y > 0) v.y *= -0.7; }

          if (p.z > maxZ) { p.z = maxZ; if (v.z > 0) v.z *= -0.7; }
          if (p.z < minZ) p.z = minZ;
        }

        // ✅ Stop prediction if it would be a goal (don't show post-goal bounces)
        // Same condition as the live goal check: entire ball crosses the goal line.
        const blueGoalLine = -halfL;
        const orangeGoalLine = halfL;

        const wouldScoreBlue = (Math.abs(p.x) <= (goalWidth/2 - ballRadius)) &&
                               (p.y >= ballRadius) && (p.y <= (goalHeight - ballRadius)) &&
                               (p.z <= blueGoalLine - ballRadius);

        const wouldScoreOrange = (Math.abs(p.x) <= (goalWidth/2 - ballRadius)) &&
                                 (p.y >= ballRadius) && (p.y <= (goalHeight - ballRadius)) &&
                                 (p.z >= orangeGoalLine + ballRadius);

        if (wouldScoreBlue || wouldScoreOrange) {
          // Clamp the path point to the goal line crossing position (approx)
          // and repeat it for the remainder of the line.
          const stopZ = wouldScoreBlue ? (blueGoalLine - ballRadius) : (orangeGoalLine + ballRadius);
          p.z = stopZ;

          // write the stop point into the CURRENT point (already written next loop),
          // and fill remaining points now.
          for (let j = i + 1; j < steps; j++) {
            const jdx = j * 3;
            ballPathPositions[jdx + 0] = p.x;
            ballPathPositions[jdx + 1] = 0.06;
            ballPathPositions[jdx + 2] = p.z;

            ballPathPositions3D[jdx + 0] = p.x;
            ballPathPositions3D[jdx + 1] = p.y;
            ballPathPositions3D[jdx + 2] = p.z;
          }

          // Break out of the simulation loop early
          i = steps;
          break;
        }

        // Mild air drag
        v.multiplyScalar(Math.pow(0.995, BALL_PATH_STEP * 60));
      }

      ballPathLine.geometry.attributes.position.needsUpdate = true;
      ballPathLine3D.geometry.attributes.position.needsUpdate = true;
    }


    function resetPositions(fullReset, withCountdown = true) {
      // Host = blue side (-z), Client = orange side (+z)
      const myZ = (isMultiplayer && !isHost) ? fieldLength / 4 : -fieldLength / 4;
      const myHeading = (isMultiplayer && !isHost) ? Math.PI : 0;
      const opZ = (isMultiplayer && !isHost) ? -fieldLength / 4 : fieldLength / 4;
      const opHeading = (isMultiplayer && !isHost) ? 0 : Math.PI;

      car.position.set(0, 1, myZ);
      carVelocity.set(0, 0, 0);
      carHeading = myHeading;
      car.rotation.set(0, 0, 0);
      car.quaternion.setFromEuler(new THREE.Euler(0, myHeading, 0));
      onGround = true;
      jumpsRemaining = 2;
      aerialActive = {};

      // Opponent car reset
      if (opponentCar) {
        opponentCar.position.set(0, 1, opZ);
        opponentCar.quaternion.setFromEuler(new THREE.Euler(0, opHeading, 0));
        opponentCarVelocity.set(0, 0, 0);
        opponentCarHeading = opHeading;
        opponentOnGround = true;
        opponentIsBoostingVisual = false;
        opponentTargetState = null;
      }

      ball.position.set(0, 4, 0);
      ballVelocity.set(0, 0, 0);
      ball.visible = true;

      if (ballIndicator) {
        ballIndicator.position.set(ball.position.x, 0.02, ball.position.z);
        ballIndicator.visible = true;
      }

      if (ballPathLine) ballPathLine.visible = showBallPath;
      if (ballPathLine3D) ballPathLine3D.visible = showBallPath;

      // ✅ Reset partial overlay state
      if (ballInsideOverlay) ballInsideOverlay.visible = false;
      ballInGoalWhich = null;

      // Clear ball trail
      ballTrailPoints = [];

      goalActive = false;
      goalTime = 0;
      goalBannerEl.style.opacity = 0;
      goalBannerEl.style.transform = "translate(-50%, -50%) scale(0.9)";
      if (goalSpeedEl) goalSpeedEl.textContent = "";

      if (withCountdown) startCountdown();
    }

    function startCountdown() {
      countdownTime = 3.0;
      countdownActive = true;
      lastCountdownDisplay = 3;
      countdownEl.textContent = "3";
      countdownEl.style.opacity = 1;
      countdownEl.style.transform = "translate(-50%, -50%) scale(1)";
    }

    function updateCountdown(dt) {
      if (!countdownActive) return;
      countdownTime -= dt;

      if (countdownTime <= 0) {
        countdownActive = false;
        // Show "GO!" briefly
        countdownEl.textContent = "GO!";
        countdownEl.style.opacity = 1;
        countdownEl.style.color = "#2bffa4";
        countdownEl.style.transform = "translate(-50%, -50%) scale(1.3)";
        setTimeout(() => {
          countdownEl.style.opacity = 0;
          countdownEl.style.transform = "translate(-50%, -50%) scale(0.9)";
          countdownEl.style.color = "#fff";
        }, 500);
        return;
      }

      const display = Math.max(1, Math.ceil(countdownTime));
      if (display !== lastCountdownDisplay) {
        lastCountdownDisplay = display;
        countdownEl.textContent = display.toString();
        countdownEl.style.transform = "translate(-50%, -50%) scale(1.2)";
        setTimeout(() => {
          countdownEl.style.transform = "translate(-50%, -50%) scale(1)";
        }, 80);
      }
    }

    function startGoalBanner() {
      goalTime = 5.0;
      goalActive = true;

      // Goal explosion particles
      if (ball) {
        const goalPos = ball.position.clone();
        spawnParticles(goalPos, 0xffa500, 40, 20, 1.2);
        spawnParticles(goalPos, 0xffff00, 30, 15, 1.0);
        spawnParticles(goalPos, 0xff4444, 20, 12, 0.8);
        triggerShake(2.0, 0.4);
      }

            if (goalSpeedEl) {
        const goalMps = ballVelocity.length() * UNITS_TO_METERS;
        goalSpeedEl.textContent = "Speed: " + (goalMps * 3.6).toFixed(2) + " km/h";
      }
      goalBannerEl.style.opacity = 1;
      goalBannerEl.style.transform = "translate(-50%, -50%) scale(1)";

      if (ball) ball.visible = false;
      if (ballIndicator) ballIndicator.visible = false;
      if (ballInsideOverlay) ballInsideOverlay.visible = false;
      ballInGoalWhich = null;
    }

    function updateGoalBanner(dt) {
      if (!goalActive) return;
      if (gameState !== "playing") { goalActive = false; goalBannerEl.style.opacity = 0; return; }
      goalTime -= dt;

      if (goalTime <= 0) {
        goalActive = false;
        goalBannerEl.style.opacity = 0;
        goalBannerEl.style.transform = "translate(-50%, -50%) scale(0.9)";
        if (isOvertime) {
          endMatch();
        } else {
          resetPositions(false, true);
          if (isMultiplayer && isHost && gameChannel) {
            gameChannel.publish("gameEvent", { type: "reset", full: false, countdown: true });
          }
        }
        return;
      }

      const scale = 1 + 0.08 * Math.sin(time * 4);
      goalBannerEl.style.transform = "translate(-50%, -50%) scale(" + scale + ")";
    }

    function startOvertime() {
      isOvertime = true;
      overtimeTime = 0;
      overtimeBannerTime = 2.0;
      overtimeBannerEl.style.opacity = 1;
      overtimeBannerEl.style.transform = "translate(-50%, -50%) scale(1)";
      resetPositions(false, false);
      updateTimerDisplay();
      if (isMultiplayer && isHost && gameChannel) {
        gameChannel.publish("gameEvent", { type: "overtime" });
      }
    }

    function updateOvertimeBanner(dt) {
      if (!isOvertime || overtimeBannerTime <= 0) return;
      overtimeBannerTime -= dt;

      const scale = 1 + 0.05 * Math.sin(time * 4);
      overtimeBannerEl.style.transform = "translate(-50%, -50%) scale(" + scale + ")";

      if (overtimeBannerTime <= 0) {
        overtimeBannerEl.style.opacity = 0;
        overtimeBannerEl.style.transform = "translate(-50%, -50%) scale(0.9)";
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function isAerialKey(code) {
      return code === "KeyW" || code === "KeyS" || code === "KeyA" ||
             code === "KeyD" || code === "KeyQ" || code === "KeyE";
    }

    function doJump() {
      if (gameState === "playing") {
        if (jumpsRemaining > 0 && !countdownActive) {
          carVelocity.y = 18;
          playJumpSound();
          airBoostReverseLatch = (onGround && keys["KeyS"] && mouseBoost);
          onGround = false;
          jumpsRemaining--;
        }
      } else if (gameState === "postGame") {
        carVelocity.y = 18;
        airBoostReverseLatch = false;
        onGround = false;
      }
    }

    function setBallPossession() {
      if (!car || !ball || goalActive || gameState !== "playing") return;
      const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion).normalize();
      const offset = 4.5;
      ball.position.copy(car.position).addScaledVector(forward, offset);
      const minY = ballRadius + 0.1;
      if (ball.position.y < minY) ball.position.y = minY;
      ballVelocity.set(0, 0, 0);
      if (ballIndicator) ballIndicator.position.set(ball.position.x, 0.02, ball.position.z);
    }

    function setBallDribble() {
      if (!car || !ball || goalActive || gameState !== "playing") return;
      const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion).normalize();
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(car.quaternion).normalize();
      const upOffset = 1.7;
      const frontOffset = 0.1;
      ball.position.copy(car.position).addScaledVector(up, upOffset).addScaledVector(forward, frontOffset);
      ballVelocity.set(0, 0, 0);
      if (ballIndicator) ballIndicator.position.set(ball.position.x, 0.02, ball.position.z);
    }

    function popBallUpOneJump() {
      if (!ball || goalActive || gameState !== "playing") return;
      ballVelocity.y = 18;
    }

    function multiplyBallHorizontalSpeed(mult) {
      if (!ball || goalActive || gameState !== "playing") return;
      ballVelocity.x *= mult;
      ballVelocity.z *= mult;
    }

    function onKeyDown(e) {
      keys[e.code] = true;
      if (!audioUnlocked) audioUnlocked = true;

      if (e.code === "KeyY") {
        // Toggle sound settings during match (game continues, no pause)
        if (soundModalOverlay) {
          if (soundModalOverlay.style.display === "flex") {
            stopPreviewSound();
            soundModalOverlay.style.display = "none";
          } else {
            Object.assign(pendingSoundSettings, soundSettings);
            setModalSelectValues(pendingSoundSettings);
            soundModalOverlay.style.display = "flex";
          }
        }
        e.preventDefault();
        return;
      }

      if (e.code === "KeyC") {
        hudEl.style.display = (hudEl.style.display === "none") ? "block" : "none";
        e.preventDefault();
        return;
      }


      if (e.code === "KeyT") {
        if (timeControlEl) {
          timeControlEl.style.display = (timeControlEl.style.display === "none" || timeControlEl.style.display === "") ? "block" : "none";
        }
        e.preventDefault();
        return;
      }


      if (e.code === "KeyP") {
        showBallPath = !showBallPath;
        if (ballPathLine) ballPathLine.visible = showBallPath;
        if (ballPathLine3D) ballPathLine3D.visible = showBallPath;
        e.preventDefault();
        return;
      }

      if (e.code === "KeyM") {
        if (minimapEl) {
          minimapEl.style.display = (minimapEl.style.display === "none") ? "block" : "none";
        }
        e.preventDefault();
        return;
      }

      if (e.code === "KeyH") {
        const newVis = !(hitboxMesh && hitboxMesh.visible);
        if (hitboxMesh) hitboxMesh.visible = newVis;
        if (ballHitboxMesh) ballHitboxMesh.visible = newVis;
        showGoalHitboxes = newVis;
        goalHitboxVisuals.forEach(m => m.visible = showGoalHitboxes);
        e.preventDefault();
        return;
      }

      if (e.code === "Backspace") {
        if (gameState === "playing") resetPositions(false, true);
        e.preventDefault();
        return;
      }

      if (e.code === "Delete") {
        if (gameState === "playing") {
          scoreLeft = 0; scoreRight = 0; updateScore();
          isOvertime = false; overtimeTime = 0;
          matchTime = 300; updateTimerDisplay();
          resetPositions(true, true);
        }
        e.preventDefault();
        return;
      }

      if (e.code === "ArrowLeft") {
        if (gameState === "playing" && !goalActive && !isOvertime) {
          matchTime = Math.max(0, matchTime - 60);
          if (matchTime === 0) {
            if (scoreLeft === scoreRight) startOvertime();
            else endMatch();
          } else updateTimerDisplay();
        }
        e.preventDefault();
        return;
      }

      if (e.code === "ArrowRight") {
        if (gameState === "playing" && !goalActive && !isOvertime) {
          matchTime = Math.min(60*60, matchTime + 60);
          updateTimerDisplay();
        }
        e.preventDefault();
        return;
      }

      if (e.code === "Digit1") { if (!countdownActive) setBallPossession(); e.preventDefault(); return; }
      if (e.code === "Digit2") { if (!countdownActive) setBallDribble();    e.preventDefault(); return; }
      if (e.code === "Digit3") { if (!countdownActive) popBallUpOneJump();  e.preventDefault(); return; }
      if (e.code === "Digit4") { if (!countdownActive) multiplyBallHorizontalSpeed(e.shiftKey ? 10 : 2); e.preventDefault(); return; }

      if (!onGround && isAerialKey(e.code)) aerialActive[e.code] = true;

      if (e.code === "Space") {
        ballCam = !ballCam;
        e.preventDefault();
        return;
      }
    }

    function onKeyUp(e) {
      keys[e.code] = false;
      if (isAerialKey(e.code)) aerialActive[e.code] = false;
    }

    function onMouseDown(e) {
      unlockAudio();
      if (!audioUnlocked) audioUnlocked = true;
      if (e.button === 0) mouseBoost = true;
      else if (e.button === 2) doJump();
      else if (e.button === 1) reverseView = true;
    }

    function onMouseUp(e) {
      if (e.button === 0) { mouseBoost = false; airBoostReverseLatch = false; }
      else if (e.button === 1) reverseView = false;
    }

    function animate() {
      requestAnimationFrame(animate);

      // Raw frame delta (unscaled), clamped for stability
      const rawDt = Math.min(clock.getDelta(), 0.05);

      // Apply time scale
      const scaledDt = rawDt * timeScale;

      // Substep when running fast to keep physics stable
      const maxStep = 0.02;
      const steps = Math.max(1, Math.ceil(scaledDt / maxStep));
      const dt = scaledDt / steps;

      for (let i = 0; i < steps; i++) {
        time += dt;

        updateStadium(dt);
        updateCountdown(dt);
        updateGoalBanner(dt);
        updateOvertimeBanner(dt);
        updateFade(dt);

        isBoostingVisual = false;
      hitSoundCooldown = Math.max(0, hitSoundCooldown - dt);
      goalpostSoundCooldown = Math.max(0, goalpostSoundCooldown - dt);

        if (gameState === "playing") {
          if (!countdownActive) {
            updateCar(dt, false, false);
            updateBoostTrail(dt);
            if (isMultiplayer) { updateOpponentCar(dt); updateOpponentBoostTrail(dt); }
            if (!goalActive) {
              if (!isMultiplayer || isHost) {
                updateBall(dt);
                handleCarBallCollision();
                checkGoal();
                updateMatchTimer(dt);
              } else {
                // Client: run local ball physics + blend toward host state
                updateBallClientPredicted(dt);
                // Client also ticks timer locally (host corrects periodically)
                updateMatchTimer(dt);
              }
            }
          } else {
            updateCar(dt, true, false);
            updateBoostTrail(dt);
            if (isMultiplayer) { updateOpponentCar(dt); updateOpponentBoostTrail(dt); }
          }
        } else if (gameState === "postGame") {
          updateCar(dt, true, true);
          updateBoostTrail(dt);
          updateCelebration(dt);
        } else {
          updateCar(dt, true, false);
          updateBoostTrail(dt);
        }
      }

      updateSpeedHUD();
      updateBallPathLine();
      updateBallTrail(scaledDt);
      updateParticles(scaledDt);
      updateShake(scaledDt);

      // Network tick
      if (isMultiplayer && peerConnected && gameChannel) {
        netTickTimer += scaledDt;
        if (netTickTimer >= 1 / NET_TICK_RATE) {
          netTickTimer -= 1 / NET_TICK_RATE;
          if (isHost) sendHostState();
          else sendClientState();
        }
      }

      updateCamera();
      // Apply screen shake after camera is set
      camera.position.add(shakeOffset);
      updateMinimap();
      updateBallArrow();
      renderer.render(scene, camera);
    }

    // True if the car is aligned with the goal opening (so it can enter the tunnel)
    function carInGoalMouth() {
      return Math.abs(car.position.x) <= (goalWidth/2 - 1.5) && (car.position.y <= goalHeight + 0.5);
    }

    // Tunnel collision so car can't clip through goal ceiling/side/back and "teleport"
    function constrainCarInGoalTunnel(isBlue, halfL) {
      const zLine = isBlue ? -halfL : halfL;
      const zBack = isBlue ? (zLine - goalDepth) : (zLine + goalDepth);

      if (isBlue) { if (car.position.z > zLine - carRadZ) return; }
      else        { if (car.position.z < zLine + carRadZ) return; }

      const maxX = goalWidth/2 - carRadX;
      if (car.position.x < -maxX) { car.position.x = -maxX; if (carVelocity.x < 0) carVelocity.x *= -0.55; }
      if (car.position.x >  maxX) { car.position.x =  maxX; if (carVelocity.x > 0) carVelocity.x *= -0.55; }

      const maxY = goalHeight - carHalfY;
      if (car.position.y > maxY) { car.position.y = maxY; if (carVelocity.y > 0) carVelocity.y *= -0.55; }

      if (isBlue) {
        const minZ = zBack + carRadZ;
        if (car.position.z < minZ) { car.position.z = minZ; if (carVelocity.z < 0) carVelocity.z *= -0.55; }
      } else {
        const maxZ = zBack - carRadZ;
        if (car.position.z > maxZ) { car.position.z = maxZ; if (carVelocity.z > 0) carVelocity.z *= -0.55; }
      }
    }

    function updateCar(dt, freezeHorizontal, postGameMode=false) {
      const accel = 40;
      const brake = 35;
      const turnSpeed = 2.6;
      const maxGroundSpeed = 50;
      const maxAirSpeed = 60;

      const wasOnGround = onGround;
      isBoostingVisual = false;

      if (!freezeHorizontal && !postGameMode) {
        if (onGround) {
          const euler = new THREE.Euler().setFromQuaternion(car.quaternion, 'YXZ');
          let pitch = euler.x, yaw = euler.y, roll = euler.z;

          if (keys["KeyA"]) yaw += turnSpeed * dt;
          if (keys["KeyD"]) yaw -= turnSpeed * dt;

          carHeading = yaw;

          const damp = Math.max(0, 1 - dt * 10);
          pitch *= damp;
          roll  *= damp;

          car.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, roll, 'YXZ'));

          const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));

          let targetAccel = 0;
          if (keys["KeyW"]) targetAccel += accel;
          if (keys["KeyS"]) targetAccel -= brake;

          const boostingForward = mouseBoost && targetAccel > 0;
          const boostingBackward = mouseBoost && keys["KeyS"];

          if (boostingForward) {
            targetAccel += accel * 3.0;
            isBoostingVisual = true;
          }

          const horizVel = new THREE.Vector3(carVelocity.x, 0, carVelocity.z);
          horizVel.add(forward.clone().multiplyScalar(targetAccel * dt));

          if (boostingBackward) {
            const backAccel = accel * 3.0;
            horizVel.add(forward.clone().multiplyScalar(-backAccel * dt));
            isBoostingVisual = true;
          }

          const speed = horizVel.length();
          if (speed > maxGroundSpeed) horizVel.setLength(maxGroundSpeed);
          horizVel.multiplyScalar(Math.pow(0.9, dt * 60 * 0.5));

          carVelocity.x = horizVel.x;
          carVelocity.z = horizVel.z;
        } else {
          // ✅ Q/E roll twice as fast: rollSpeed doubled from 2.5 -> 5.0
          const pitchSpeed = 2.0, rollSpeed = 5.0, yawSpeed = 2.0;

          // ✅ When reverse-boosting in air (from S+boost takeoff), don't also pitch backwards
          const reverseBoostActive = airBoostReverseLatch && keys["KeyS"] && mouseBoost;

          if (aerialActive["KeyW"]) car.rotateX( pitchSpeed * dt);
          if (aerialActive["KeyS"] && !reverseBoostActive) car.rotateX(-pitchSpeed * dt);
          if (aerialActive["KeyA"]) car.rotateY( yawSpeed * dt);
          if (aerialActive["KeyD"]) car.rotateY(-yawSpeed * dt);
          if (aerialActive["KeyQ"]) car.rotateZ(-rollSpeed * dt);
          if (aerialActive["KeyE"]) car.rotateZ( rollSpeed * dt);

          const tmpForward = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
          carHeading = Math.atan2(tmpForward.x, tmpForward.z);

          if (mouseBoost) {
            const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion).normalize();
            // ✅ If S+boost was held at takeoff, allow reverse boost in the air while S is held
            const reverseAirBoost = airBoostReverseLatch && keys["KeyS"];
            carVelocity.addScaledVector(forwardDir, (reverseAirBoost ? -70 : 70) * dt);
            isBoostingVisual = true;
          }

          if (carVelocity.length() > maxAirSpeed) carVelocity.setLength(maxAirSpeed);
          carVelocity.multiplyScalar(Math.pow(0.99, dt * 60));
        }
      } else {
        carVelocity.x *= Math.pow(0.9, dt * 60);
        carVelocity.z *= Math.pow(0.9, dt * 60);

        if (postGameMode) {
          const pitchSpeed = 2.0, rollSpeed = 5.0, yawSpeed = 2.0;

          if (keys["KeyW"] || aerialActive["KeyW"]) car.rotateX( pitchSpeed * dt);
          if (keys["KeyS"] || aerialActive["KeyS"]) car.rotateX(-pitchSpeed * dt);
          if (keys["KeyA"] || aerialActive["KeyA"]) car.rotateY( yawSpeed * dt);
          if (keys["KeyD"] || aerialActive["KeyD"]) car.rotateY(-yawSpeed * dt);
          if (keys["KeyQ"] || aerialActive["KeyQ"]) car.rotateZ(-rollSpeed * dt);
          if (keys["KeyE"] || aerialActive["KeyE"]) car.rotateZ( rollSpeed * dt);

          if (mouseBoost) {
            carVelocity.y += 22 * dt;
            isBoostingVisual = true;
          }
        }
      }

      carVelocity.y += gravity * dt;
      car.position.addScaledVector(carVelocity, dt);

      const minY = 0.8;
      if (car.position.y <= minY) {
        car.position.y = minY;
        if (carVelocity.y < 0) carVelocity.y = 0;
        onGround = true;

        if (!wasOnGround) {
          const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
          carHeading = Math.atan2(forwardDir.x, forwardDir.z);
        }

        jumpsRemaining = 2;
        aerialActive = {};
        airBoostReverseLatch = false;
      } else {
        onGround = false;
      }

      if (!postGameMode) {
        const halfW = fieldWidth/2;
        const halfL = fieldLength/2;

        if (car.position.x < -halfW + carRadX) { car.position.x = -halfW + carRadX; if (carVelocity.x < 0) carVelocity.x *= -0.55; }
        if (car.position.x >  halfW - carRadX) { car.position.x =  halfW - carRadX; if (carVelocity.x > 0) carVelocity.x *= -0.55; }

        if (car.position.z < -halfL + carRadZ) {
          if (carInGoalMouth()) constrainCarInGoalTunnel(true, halfL);
          else { car.position.z = -halfL + carRadZ; if (carVelocity.z < 0) carVelocity.z *= -0.55; }
        }
        if (car.position.z > halfL - carRadZ) {
          if (carInGoalMouth()) constrainCarInGoalTunnel(false, halfL);
          else { car.position.z = halfL - carRadZ; if (carVelocity.z > 0) carVelocity.z *= -0.55; }
        }

        if (car.position.z < -halfL) constrainCarInGoalTunnel(true, halfL);
        if (car.position.z >  halfL) constrainCarInGoalTunnel(false, halfL);
      } else {
        car.position.x = 0; car.position.z = 0;
        carVelocity.x = 0; carVelocity.z = 0;
      }
    }

    // NOTE: Ball/goal overlay behavior unchanged from your original file
    function updateBall(dt) {
      ballVelocity.y += gravity * dt;
      ball.position.addScaledVector(ballVelocity, dt);

      // Spin
      const horizVel = new THREE.Vector3(ballVelocity.x, 0, ballVelocity.z);
      const speed = horizVel.length();
      if (speed > 0.0001) {
        const dir = horizVel.clone().normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const axis = new THREE.Vector3().crossVectors(dir, up).normalize();
        const angularSpeed = speed / ballRadius;
        const angle = angularSpeed * dt;
        if (!isNaN(axis.x)) ball.rotateOnAxis(axis, angle);
      }

      // Ground
      if (ball.position.y - ballRadius <= 0) {
        ball.position.y = ballRadius;
        if (ballVelocity.y < 0) ballVelocity.y *= -0.85;
      }

      const halfW = fieldWidth/2;
      const halfL = fieldLength/2;

      // Side walls
      if (ball.position.x - ballRadius < -halfW) { ball.position.x = -halfW + ballRadius; if (ballVelocity.x < 0) ballVelocity.x *= -0.85; }
      if (ball.position.x + ballRadius >  halfW) { ball.position.x =  halfW - ballRadius; if (ballVelocity.x > 0) ballVelocity.x *= -0.85; }

      // Goal mouth logic
      const inMouthX = Math.abs(ball.position.x) <= (goalWidth/2 - ballRadius);
      const inMouthY = (ball.position.y >= ballRadius) && (ball.position.y <= (goalHeight - ballRadius));
      const inMouth = inMouthX && inMouthY;

      if (!inMouth) {
        if (ball.position.z - ballRadius < -halfL) { ball.position.z = -halfL + ballRadius; if (ballVelocity.z < 0) ballVelocity.z *= -0.85; }
        if (ball.position.z + ballRadius >  halfL) { ball.position.z =  halfL - ballRadius; if (ballVelocity.z > 0) ballVelocity.z *= -0.85; }
      }

      const zLineBlue = -halfL;
      const zLineOrange = halfL;

      // Tunnel constraints
      if (ball.position.z < zLineBlue && inMouth) {
        const minZ = zLineBlue - goalDepth + ballRadius;
        const maxZ = zLineBlue - ballRadius;
        const maxXGoal = goalWidth/2 - ballRadius;

        if (ball.position.x < -maxXGoal) { ball.position.x = -maxXGoal; if (ballVelocity.x < 0) ballVelocity.x *= -0.7; }
        if (ball.position.x >  maxXGoal) { ball.position.x =  maxXGoal; if (ballVelocity.x > 0) ballVelocity.x *= -0.7; }

        const maxYGoal = goalHeight - ballRadius;
        if (ball.position.y > maxYGoal) { ball.position.y = maxYGoal; if (ballVelocity.y > 0) ballVelocity.y *= -0.7; }

        if (ball.position.z < minZ) { ball.position.z = minZ; if (ballVelocity.z < 0) ballVelocity.z *= -0.7; }
        if (ball.position.z > maxZ) ball.position.z = maxZ;
      }

      if (ball.position.z > zLineOrange && inMouth) {
        const minZ = zLineOrange + ballRadius;
        const maxZ = zLineOrange + goalDepth - ballRadius;
        const maxXGoal = goalWidth/2 - ballRadius;

        if (ball.position.x < -maxXGoal) { ball.position.x = -maxXGoal; if (ballVelocity.x < 0) ballVelocity.x *= -0.7; }
        if (ball.position.x >  maxXGoal) { ball.position.x =  maxXGoal; if (ballVelocity.x > 0) ballVelocity.x *= -0.7; }

        const maxYGoal = goalHeight - ballRadius;
        if (ball.position.y > maxYGoal) { ball.position.y = maxYGoal; if (ballVelocity.y > 0) ballVelocity.y *= -0.7; }

        if (ball.position.z > maxZ) { ball.position.z = maxZ; if (ballVelocity.z > 0) ballVelocity.z *= -0.7; }
        if (ball.position.z < minZ) ball.position.z = minZ;
      }

      ballVelocity.multiplyScalar(Math.pow(0.995, dt * 60));

      if (ballIndicator) {
        ballIndicator.position.x = ball.position.x;
        ballIndicator.position.z = ball.position.z;

        // ✅ Inner fill scales with ball height:
        //  - on ground: 100%
        //  - at 25 units above ground: 0%
        // Linear in between, clamped.
        if (ballIndicatorInner) {
          const heightAboveGround = Math.max(0, ball.position.y - ballRadius);
          const t = Math.max(0, Math.min(1, 1 - (heightAboveGround / 50)));
          ballIndicatorInner.scale.set(t, t, 1);
        }
      }

      updateBallGoalVisual();
      updateGoalpostProximity();
    }

    function updateBoostTrail(dt) {
      if (!boostTrailLeft || !boostTrailRight || !boostTrailLeftInner || !boostTrailRightInner) return;

      const active = isBoostingVisual;
      const targetScaleZ = active ? 1.8 : 0.0;
      const lerpFactor = Math.min(1, dt * 12);

      boostTrailLeft.scale.z  += (targetScaleZ - boostTrailLeft.scale.z) * lerpFactor;
      boostTrailRight.scale.z += (targetScaleZ - boostTrailRight.scale.z) * lerpFactor;

      const minVisibleScale = 0.03;
      const visibleOuter = boostTrailLeft.scale.z > minVisibleScale;
      boostTrailLeft.visible  = visibleOuter;
      boostTrailRight.visible = visibleOuter;

      const targetInnerZ = targetScaleZ * 0.8;
      boostTrailLeftInner.scale.z  += (targetInnerZ - boostTrailLeftInner.scale.z) * lerpFactor;
      boostTrailRightInner.scale.z += (targetInnerZ - boostTrailRightInner.scale.z) * lerpFactor;

      const visibleInner = boostTrailLeftInner.scale.z > minVisibleScale;
      boostTrailLeftInner.visible  = visibleInner;
      boostTrailRightInner.visible = visibleInner;

      if (visibleOuter || visibleInner) {
        const baseLength = 1.8;
        const fill = boostTrailLeft.scale.z / baseLength;

        const thicknessPulseOuter = 1 + 0.15 * Math.sin(time * 18);
        const thicknessPulseInner = 1 + 0.25 * Math.sin(time * 22);

        boostTrailLeft.scale.x = thicknessPulseOuter;
        boostTrailLeft.scale.y = thicknessPulseOuter;
        boostTrailRight.scale.x = thicknessPulseOuter;
        boostTrailRight.scale.y = thicknessPulseOuter;

        boostTrailLeftInner.scale.x = 0.7 * thicknessPulseInner;
        boostTrailLeftInner.scale.y = 0.7 * thicknessPulseInner;
        boostTrailRightInner.scale.x = 0.7 * thicknessPulseInner;
        boostTrailRightInner.scale.y = 0.7 * thicknessPulseInner;

        const pulseOuter = 0.6 + 0.4 * Math.sin(time * 20);
        const pulseInner = 0.7 + 0.5 * Math.sin(time * 26);

        const intensity = Math.min(1, Math.max(0, fill));
        const opacityOuter = Math.min(1, Math.max(0, intensity * 0.9 * pulseOuter));
        const opacityInner = Math.min(1, Math.max(0, intensity * 1.1 * pulseInner));

        boostTrailLeft.material.opacity = opacityOuter;
        boostTrailRight.material.opacity = opacityOuter;
        boostTrailLeftInner.material.opacity = opacityInner;
        boostTrailRightInner.material.opacity = opacityInner;
      }
    }

    function handleCarBallCollision() {
      doSingleCarBallCollision(car, carVelocity);
      if (isMultiplayer && isHost && opponentCar) {
        doSingleCarBallCollision(opponentCar, opponentCarVelocity);
      }
    }

    function doSingleCarBallCollision(carObj, carVel) {
      if (!carObj || !ball) return;

      const invQuat = carObj.quaternion.clone().invert();
      const localBall = ball.position.clone().sub(carObj.position).applyQuaternion(invQuat);

      const hx = carHitboxWidth * 0.5;
      const hy = carHitboxHeight * 0.5;
      const hz = carHitboxDepth * 0.5;

      const closestLocal = new THREE.Vector3(
        Math.max(-hx, Math.min(hx, localBall.x)),
        Math.max(-hy, Math.min(hy, localBall.y - 0.2)),
        Math.max(-hz, Math.min(hz, localBall.z))
      );
      closestLocal.y += 0.2;

      const diffLocal = localBall.clone().sub(closestLocal);
      const distSq = diffLocal.lengthSq();
      const r = ballRadius;

      if (distSq < r * r) {
        if (hitSoundCooldown <= 0) {
          playSound("hit");
          hitSoundCooldown = 0.12;
        }
        // Spark particles at contact point
        const contactWorld = closestLocal.clone().applyQuaternion(carObj.quaternion).add(carObj.position);
        const hitSpeed = carVel.length();
        const sparkCount = Math.min(20, Math.floor(hitSpeed * 0.4) + 3);
        spawnParticles(contactWorld, hitSpeed > 25 ? 0xff8844 : 0xffe066, sparkCount, hitSpeed * 0.3 + 5, 0.6);
        if (hitSpeed > 8) triggerShake(Math.min(1.2, hitSpeed * 0.03), 0.15);

        let dist = Math.sqrt(distSq);
        if (dist < 1e-5) {
          diffLocal.set(0, 1, 0);
          dist = 1;
        }

        const normalLocal = diffLocal.clone().divideScalar(dist);
        const normalWorld = normalLocal.clone().applyQuaternion(carObj.quaternion).normalize();

        const penetration = r - dist;
        ball.position.addScaledVector(normalWorld, penetration + 0.01);

        const relativeVel = ballVelocity.clone().sub(carVel);
        const vn = relativeVel.dot(normalWorld);

        if (vn < 0) {
          const restitution = 0.9;
          const impulse = -(1 + restitution) * vn;
          const impulseVec = normalWorld.clone().multiplyScalar(impulse);
          ballVelocity.add(impulseVec);
          ballVelocity.addScaledVector(carVel, 0.4);
        }

        const carSpeed = new THREE.Vector3(carVel.x, 0, carVel.z).length();
        if (carSpeed > 8) ballVelocity.y = Math.max(ballVelocity.y, carSpeed * 0.4);
      }
    }

    function isBallFullyInGoal(isBlue) {
      // ✅ Goal counts only when the ENTIRE ball has crossed the goal line into the tunnel opening.
      // This means the ball's center must be at least ballRadius beyond the end line.
      const x = ball.position.x, y = ball.position.y, z = ball.position.z;

      if (Math.abs(x) > goalWidth/2 - ballRadius) return false;
      if (y < ballRadius || y > goalHeight - ballRadius) return false;

      const zLine = isBlue ? -fieldLength/2 : fieldLength/2;

      // Entire sphere past the line:
      return isBlue
        ? (z <= zLine - ballRadius)
        : (z >= zLine + ballRadius);
    }

    // "Goalpost" = ball center is within one ball length (diameter) of the goal tunnel hitbox,
    // but the ball did NOT fully enter the goal (no score). This triggers when it leaves the near zone.
    function isBallNearGoal(isBlue) {
      if (!ball) return false;

      const inflate = ballRadius * 2; // one ball length (diameter)
      const halfW = goalWidth / 2;
      const halfL = fieldLength / 2;

      const zLine = isBlue ? -halfL : halfL;
      const zBack = zLine + (isBlue ? -goalDepth : goalDepth);

      const zMin = Math.min(zLine, zBack);
      const zMax = Math.max(zLine, zBack);

      const x = ball.position.x, y = ball.position.y, z = ball.position.z;

      const insideInflated =
        (x >= -halfW - inflate && x <= halfW + inflate) &&
        (y >= -inflate && y <= goalHeight + inflate) &&
        (z >= zMin - inflate && z <= zMax + inflate);

      // If it fully entered, it's a goal (handled elsewhere), so NOT a goalpost event
      if (isBallFullyInGoal(isBlue)) return false;

      return insideInflated;
    }

    
function updateGoalpostProximity() {
      if (goalActive || gameState !== "playing") {
        nearGoalStateBlue = false;
        nearGoalStateOrange = false;
        return;
      }

      // ✅ If it's actually a goal right now, NEVER play goalpost/near-miss
      // (updateBall runs before checkGoal(), so we must suppress here)
      if (isBallFullyInGoal(true) || isBallFullyInGoal(false)) {
        nearGoalStateBlue = false;
        nearGoalStateOrange = false;
        return;
      }

      const nowBlue = isBallNearGoal(true);
      const nowOrange = isBallNearGoal(false);

      // Trigger on leaving the near zone (a "near miss") with cooldown to avoid spam
      if (!nowBlue && nearGoalStateBlue && goalpostSoundCooldown <= 0) {
        playSound("goalpost");
        goalpostSoundCooldown = 0.12;
        if (ball) spawnParticles(ball.position.clone(), 0x4488ff, 15, 10, 0.5);
        triggerShake(0.5, 0.1);
      }
      if (!nowOrange && nearGoalStateOrange && goalpostSoundCooldown <= 0) {
        playSound("goalpost");
        goalpostSoundCooldown = 0.12;
        if (ball) spawnParticles(ball.position.clone(), 0xff8844, 15, 10, 0.5);
        triggerShake(0.5, 0.1);
      }

      nearGoalStateBlue = nowBlue;
      nearGoalStateOrange = nowOrange;
    }




    function isBallPartiallyInGoal(isBlue) {
      const x = ball.position.x, y = ball.position.y, z = ball.position.z;

      const halfW = goalWidth / 2;
      const minX = -halfW - ballRadius;
      const maxX =  halfW + ballRadius;

      const minY = -ballRadius;
      const maxY = goalHeight + ballRadius;

      const zLine = isBlue ? -fieldLength/2 : fieldLength/2;
      const zBack = zLine + (isBlue ? -goalDepth : goalDepth);

      const minZ = Math.min(zLine, zBack) - ballRadius;
      const maxZ = Math.max(zLine, zBack) + ballRadius;

      return (x >= minX && x <= maxX && y >= minY && y <= maxY && z >= minZ && z <= maxZ);
    }

    // Build clipping planes that define the INSIDE of a goal tunnel volume
    function buildGoalClipPlanes(isBlue) {
      const halfW = goalWidth / 2;
      const zLine = isBlue ? -fieldLength / 2 : fieldLength / 2;
      const zBack = zLine + (isBlue ? -goalDepth : goalDepth);

      const zMin = Math.min(zLine, zBack);
      const zMax = Math.max(zLine, zBack);

      return [
        // x in [-halfW, +halfW]
        new THREE.Plane(new THREE.Vector3( 1, 0, 0), halfW),
        new THREE.Plane(new THREE.Vector3(-1, 0, 0), halfW),

        // y in [0, goalHeight]
        new THREE.Plane(new THREE.Vector3( 0, 1, 0), 0),
        new THREE.Plane(new THREE.Vector3( 0,-1, 0), goalHeight),

        // z in [zMin, zMax]
        new THREE.Plane(new THREE.Vector3( 0, 0, 1), -zMin),
        new THREE.Plane(new THREE.Vector3( 0, 0,-1),  zMax),
      ];
    }

    // ✅ Only the part of the ball inside the goal appears black (overlay)
    function updateBallGoalVisual() {
      if (!ballInsideOverlay) return;

      const inBlue = isBallPartiallyInGoal(true);
      const inOrange = isBallPartiallyInGoal(false);

      let which = null;
      if (inBlue) which = "blue";
      else if (inOrange) which = "orange";

      if (!which) {
        ballInsideOverlay.visible = false;
        ballInGoalWhich = null;
        return;
      }

      if (ballInGoalWhich !== which) {
        const planes = buildGoalClipPlanes(which === "blue");
        ballInsideOverlay.material.clippingPlanes = planes;
        ballInsideOverlay.material.needsUpdate = true;
        ballInGoalWhich = which;
      }

      ballInsideOverlay.visible = true;
    }

    function checkGoal() {
      if (goalActive || gameState !== "playing") return;

      if (isBallFullyInGoal(true)) {
        scoreRight++;
        playSound("goal");
        updateScore();
        if (goalTextEl) goalTextEl.textContent = "ORANGE GOAL!";
        goalBannerEl.style.background = "radial-gradient(circle at top, rgba(255,184,77,0.9), rgba(255,94,58,0.85))";
        startGoalBanner();
        if (isMultiplayer && isHost && gameChannel) {
          gameChannel.publish("gameEvent", { type: "goal", team: "orange", sL: scoreLeft, sR: scoreRight });
        }
      } else if (isBallFullyInGoal(false)) {
        scoreLeft++;
        playSound("goal");
        updateScore();
        if (goalTextEl) goalTextEl.textContent = "BLUE GOAL!";
        goalBannerEl.style.background = "radial-gradient(circle at top, rgba(77,150,255,0.9), rgba(58,94,255,0.85))";
        startGoalBanner();
        if (isMultiplayer && isHost && gameChannel) {
          gameChannel.publish("gameEvent", { type: "goal", team: "blue", sL: scoreLeft, sR: scoreRight });
        }
      }
    }

    function updateScore() {
      scoreLeftTopEl.textContent = scoreLeft;
      scoreRightTopEl.textContent = scoreRight;
    }

    // ✅ CAMERA FIX: ball-cam works inside goals + car stays visible at top
    function updateCamera() {
      let offsetBack = 22;
      let offsetUp = 8;

      const carPivot = car.position.clone().add(new THREE.Vector3(0, 1.5, 0));

      let desiredCamPos;
      let lookAtPos;

      // Detect when the car is actually inside the goal tunnel volume
      const halfL = fieldLength * 0.5;
      const inGoalX = Math.abs(car.position.x) <= (goalWidth * 0.5 + 1.0);
      const inGoalY = car.position.y <= (goalHeight + 2.0);
      const inBlueTunnel = (car.position.z < -halfL - 0.5) && inGoalX && inGoalY;
      const inOrangeTunnel = (car.position.z >  halfL + 0.5) && inGoalX && inGoalY;
      const inGoalTunnel = inBlueTunnel || inOrangeTunnel;

      // When inside the tunnel, pull the camera closer + slightly higher so the mouth borders don't occlude view
      if (inGoalTunnel) {
        offsetBack = 14;
        offsetUp = 7;
      }

      if (reverseView) {
        const dir = new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading));
        desiredCamPos = car.position.clone()
          .addScaledVector(dir, offsetBack)
          .add(new THREE.Vector3(0, offsetUp, 0));
        lookAtPos = carPivot;
      } else if (ballCam && gameState !== "postGame") {
        const carToBall = new THREE.Vector3().subVectors(ball.position, car.position);
        if (carToBall.lengthSq() > 0.0001) {
          const dirAwayFromBall = carToBall.normalize().multiplyScalar(-1);
          desiredCamPos = car.position.clone().addScaledVector(dirAwayFromBall, 26);
          desiredCamPos.y += ballCamHeightOffset;
          lookAtPos = ball.position.clone();
        } else {
          const dir = new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading));
          desiredCamPos = car.position.clone()
            .addScaledVector(dir, -offsetBack)
            .add(new THREE.Vector3(0, offsetUp, 0));
          lookAtPos = carPivot;
        }
      } else {
        if (gameState === "postGame") {
          desiredCamPos = new THREE.Vector3(28, 16, 18);
          lookAtPos = new THREE.Vector3(0, 4, 0);
        } else {
          const dir = new THREE.Vector3(Math.sin(carHeading), 0, Math.cos(carHeading));
          desiredCamPos = car.position.clone()
            .addScaledVector(dir, -offsetBack)
            .add(new THREE.Vector3(0, offsetUp, 0));
          lookAtPos = carPivot;
        }
      }

      // If inside the tunnel, clamp the camera position to stay inside the tunnel bounds (prevents "mouth border" blocking)
      if (inGoalTunnel) {
        const zLine = inBlueTunnel ? -halfL : halfL;
        const zBack = zLine + (inBlueTunnel ? -goalDepth : goalDepth);

        const zMin = Math.min(zLine, zBack) + 2.0;
        const zMax = Math.max(zLine, zBack) - 2.0;

        desiredCamPos.x = Math.max(-(goalWidth*0.5 - 1.5), Math.min((goalWidth*0.5 - 1.5), desiredCamPos.x));
        desiredCamPos.y = Math.max(2.0, Math.min(goalHeight - 1.0, desiredCamPos.y));
        desiredCamPos.z = Math.max(zMin, Math.min(zMax, desiredCamPos.z));

        // look slightly above the car pivot while inside the tunnel for cleaner sight-lines
        lookAtPos = carPivot.clone().add(new THREE.Vector3(0, 0.6, 0));
      }

      // Goal-area heuristic: ignore the "top segment" above goal mouth (helps ball-cam at the line)
      const nearGoalZ = Math.abs(car.position.z) > (fieldLength * 0.5 - 18);
      const nearGoal = nearGoalZ && inGoalX;

      // Raycast from carPivot (stable) to camera
      const rayOrigin = carPivot;
      const toCam = new THREE.Vector3().subVectors(desiredCamPos, rayOrigin);
      const distance = toCam.length();

      if (distance > 0.001 && cameraColliders.length > 0) {
        const dirToCam = toCam.clone().normalize();
        raycaster.set(rayOrigin, dirToCam);

        // Inside tunnel: don't let the end-wall segments "push" the camera into the mouth border
        const colliders = inGoalTunnel
          ? cameraColliders.filter(o => !o.userData.isEndWallSeg)
          : (nearGoal ? cameraColliders.filter(o => !o.userData.isGoalTopSeg) : cameraColliders);

        const intersects = raycaster.intersectObjects(colliders, true);
        if (intersects.length > 0 && intersects[0].distance < distance) {
          const hitPoint = intersects[0].point;
          desiredCamPos = hitPoint.clone().addScaledVector(dirToCam, -0.8);
        }
      }

      // Minimum distance so the car doesn't clip out
      const minCamDist = inGoalTunnel ? 4.8 : 6.0;
      const finalToCam = new THREE.Vector3().subVectors(desiredCamPos, rayOrigin);
      if (finalToCam.length() < minCamDist) {
        desiredCamPos = rayOrigin.clone().addScaledVector(finalToCam.normalize(), minCamDist);
      }

      camera.position.lerp(desiredCamPos, 0.18);
      camera.lookAt(lookAtPos);
    }

    function updateMatchTimer(dt) {
      if (!isOvertime) {
        if (matchTime <= 0) return;
        matchTime -= dt;

        if (matchTime <= 0) {
          matchTime = 0;
          updateTimerDisplay();
          // Only host triggers end-game logic
          if (!isMultiplayer || isHost) {
            if (scoreLeft === scoreRight) startOvertime();
            else endMatch();
          }
        } else {
          updateTimerDisplay();
        }
      } else {
        overtimeTime += dt;
        updateTimerDisplay();
      }
    }

    function updateTimerDisplay() {
      if (!isOvertime) {
        const total = Math.max(0, matchTime); // keep fractional seconds
        const mins = Math.floor(total / 60);
        const secs = Math.floor(total % 60);
        const hundredths = Math.floor((total - Math.floor(total)) * 100);

        matchTimerEl.textContent =
          mins + ":" +
          (secs < 10 ? "0" + secs : secs) +
          "." +
          (hundredths < 10 ? "0" + hundredths : hundredths);
      } else {
        const total = Math.max(0, overtimeTime); // keep fractional seconds
        const mins = Math.floor(total / 60);
        const secs = Math.floor(total % 60);
        const hundredths = Math.floor((total - Math.floor(total)) * 100);

        matchTimerEl.textContent =
          "+" + mins + ":" +
          (secs < 10 ? "0" + secs : secs) +
          "." +
          (hundredths < 10 ? "0" + hundredths : hundredths);
      }
    }

    function updateSpeedHUD() {
      const carMps = carVelocity.length() * UNITS_TO_METERS;
      const ballMps = ballVelocity.length() * UNITS_TO_METERS;
      carSpeedEl.textContent = "Car: " + (carMps * 3.6).toFixed(2) + " km/h";
      ballSpeedEl.textContent = "Ball: " + (ballMps * 3.6).toFixed(2) + " km/h";
    }

    function endMatch() {
      if (gameState !== "playing") return;

      // Send to client
      if (isMultiplayer && isHost && gameChannel) {
        gameChannel.publish("gameEvent", { type: "end", sL: scoreLeft, sR: scoreRight });
      }

      gameState = "postGame";
      celebrationTime = 0;
      buttonsShown = false;
      endPanelEl.classList.remove("showButtons");

      car.position.x = 0;
      car.position.z = 0;
      carVelocity.x = 0;
      carVelocity.z = 0;

      if (ball) ball.visible = false;
      if (ballIndicator) ballIndicator.visible = false;
      if (ballInsideOverlay) ballInsideOverlay.visible = false;
      ballInGoalWhich = null;

      let winnerText = "";
      if (scoreLeft > scoreRight) {
        winnerText = "BLUE WINS!";
        winnerTextEl.style.color = "#34b3ff";
        playSound("win");
      }
      else if (scoreRight > scoreLeft) {
        winnerText = "ORANGE WINS!";
        winnerTextEl.style.color = "#ffcd3c";
        playSound("lose");
      }
      else {
        winnerText = "TIE GAME!";
        winnerTextEl.style.color = "#ffffff";
      }

      winnerTextEl.textContent = winnerText;

      fadeActive = true;
      fadeAlpha = 0;

      endScreenEl.classList.add("visible");

      // ✅ Show end-game buttons immediately
      buttonsShown = true;
      endPanelEl.classList.add("showButtons");
    }

    function updateFade(dt) {
      if (!fadeActive) return;

      fadeAlpha += dt * 0.65;
      if (fadeAlpha >= 1) {
        fadeAlpha = 1;
        fadeActive = false;
      }
      fadeOverlayEl.style.background = "rgba(0,0,0," + (0.55 * fadeAlpha) + ")";
    }

    function updateCelebration(dt) {
      celebrationTime += dt;
      if (!buttonsShown && celebrationTime >= CELEBRATION_DURATION) {
        buttonsShown = true;
        endPanelEl.classList.add("showButtons");
      }
    }

    function startMatchFromMenu() {
      stopAllSounds();
      mainMenuEl.style.display = "none";
      if (soundModalOverlay) { stopPreviewSound(); soundModalOverlay.style.display = "none"; }
      startMatchCommon();
    }

    function startMatchFromEndScreen() {
      stopAllSounds();
      if (isMultiplayer && gameChannel) {
        gameChannel.publish("gameEvent", { type: "start" });
      }
      startMatchCommon();
    }

    function startMatchCommon() {
      endScreenEl.classList.remove("visible");
      endPanelEl.classList.remove("showButtons");

      fadeOverlayEl.style.background = "rgba(0,0,0,0)";
      fadeActive = false;

      gameState = "playing";
      scoreLeft = 0; scoreRight = 0; updateScore();

      isOvertime = false;
      overtimeTime = 0;
      overtimeBannerTime = 0;
      overtimeBannerEl.style.opacity = 0;

      matchTime = 300;
      updateTimerDisplay();

      if (ball) ball.visible = true;
      if (ballIndicator) ballIndicator.visible = true;

      // Clear particles and trail
      particles.forEach(p => { scene.remove(p.mesh); p.mesh.material.dispose(); });
      particles.length = 0;
      ballTrailPoints = [];

      resetPositions(true, true);
    }

    function showMainMenu() {
      stopAllSounds();
      disconnectMultiplayer();
      resetMenuUI();
endScreenEl.classList.remove("visible");
      endPanelEl.classList.remove("showButtons");

      fadeOverlayEl.style.background = "rgba(0,0,0,0)";
      fadeActive = false;

      gameState = "menu";
      isOvertime = false;
      overtimeTime = 0;
      overtimeBannerTime = 0;
      overtimeBannerEl.style.opacity = 0;

      mainMenuEl.style.display = "flex";
            if (audioUnlocked) playSound("intro");
if (soundModalOverlay) { stopPreviewSound(); soundModalOverlay.style.display = "none"; }

      if (ball) ball.visible = true;
      if (ballIndicator) ballIndicator.visible = true;

      resetPositions(true, false);
    }

    // --- Minimap ---
    function updateMinimap() {
      if (!minimapCtx || !minimapCanvas) return;
      const w = minimapCanvas.width, h = minimapCanvas.height;
      minimapCtx.clearRect(0, 0, w, h);

      // Field background
      minimapCtx.fillStyle = "rgba(5,11,17,0.9)";
      minimapCtx.fillRect(0, 0, w, h);

      // Field outline
      const pad = 8;
      const fw = w - pad * 2, fh = h - pad * 2;
      minimapCtx.strokeStyle = "rgba(150,220,255,0.3)";
      minimapCtx.lineWidth = 1;
      minimapCtx.strokeRect(pad, pad, fw, fh);

      // Center line
      minimapCtx.strokeStyle = "rgba(255,255,255,0.2)";
      minimapCtx.beginPath();
      minimapCtx.moveTo(pad, pad + fh / 2);
      minimapCtx.lineTo(pad + fw, pad + fh / 2);
      minimapCtx.stroke();

      // Goal zones
      const goalFrac = goalWidth / fieldWidth;
      const gx = pad + (fw - fw * goalFrac) / 2;
      const gw = fw * goalFrac;
      minimapCtx.fillStyle = "rgba(31,107,255,0.25)";
      minimapCtx.fillRect(gx, pad, gw, 6);
      minimapCtx.fillStyle = "rgba(255,138,61,0.25)";
      minimapCtx.fillRect(gx, pad + fh - 6, gw, 6);

      function worldToMini(wx, wz) {
        const nx = (wx + fieldWidth / 2) / fieldWidth;
        const nz = (wz + fieldLength / 2) / fieldLength;
        return [pad + nx * fw, pad + nz * fh];
      }

      // Ball
      if (ball && ball.visible) {
        const [bx, by] = worldToMini(ball.position.x, ball.position.z);
        minimapCtx.fillStyle = "#ffe066";
        minimapCtx.shadowColor = "#ffe066";
        minimapCtx.shadowBlur = 4;
        minimapCtx.beginPath();
        minimapCtx.arc(bx, by, 3.5, 0, Math.PI * 2);
        minimapCtx.fill();
        minimapCtx.shadowBlur = 0;
      }

      // Car
      if (car) {
        const [cx, cy] = worldToMini(car.position.x, car.position.z);
        minimapCtx.fillStyle = "#00f5d4";
        minimapCtx.shadowColor = "#00f5d4";
        minimapCtx.shadowBlur = 3;
        minimapCtx.beginPath();
        minimapCtx.arc(cx, cy, 3, 0, Math.PI * 2);
        minimapCtx.fill();
        // Direction indicator
        const dirX = Math.sin(carHeading) * 6;
        const dirZ = Math.cos(carHeading) * 6;
        minimapCtx.strokeStyle = "#00f5d4";
        minimapCtx.lineWidth = 1.5;
        minimapCtx.beginPath();
        minimapCtx.moveTo(cx, cy);
        minimapCtx.lineTo(cx + dirX, cy + dirZ);
        minimapCtx.stroke();
        minimapCtx.shadowBlur = 0;
      }

      // Opponent car
      if (opponentCar && isMultiplayer) {
        const [ox, oy] = worldToMini(opponentCar.position.x, opponentCar.position.z);
        minimapCtx.fillStyle = "#ff8a3d";
        minimapCtx.shadowColor = "#ff8a3d";
        minimapCtx.shadowBlur = 3;
        minimapCtx.beginPath();
        minimapCtx.arc(ox, oy, 3, 0, Math.PI * 2);
        minimapCtx.fill();
        const odirX = Math.sin(opponentCarHeading) * 6;
        const odirZ = Math.cos(opponentCarHeading) * 6;
        minimapCtx.strokeStyle = "#ff8a3d";
        minimapCtx.lineWidth = 1.5;
        minimapCtx.beginPath();
        minimapCtx.moveTo(ox, oy);
        minimapCtx.lineTo(ox + odirX, oy + odirZ);
        minimapCtx.stroke();
        minimapCtx.shadowBlur = 0;
      }
    }

    // --- Ball offscreen arrow indicator ---
    function updateBallArrow() {
      if (!ballArrowEl || !ball || !ball.visible || gameState !== "playing") {
        if (ballArrowEl) ballArrowEl.style.opacity = 0;
        return;
      }
      // Project ball position to screen
      const ballScreen = ball.position.clone().project(camera);
      const hw = window.innerWidth / 2;
      const hh = window.innerHeight / 2;
      const sx = (ballScreen.x * hw) + hw;
      const sy = -(ballScreen.y * hh) + hh;

      const margin = 50;
      const offscreen = sx < -margin || sx > window.innerWidth + margin ||
                        sy < -margin || sy > window.innerHeight + margin ||
                        ballScreen.z > 1;

      if (!offscreen) {
        ballArrowEl.style.opacity = 0;
        return;
      }

      // Clamp to screen edges
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      let dx = sx - cx, dy = sy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      dx /= dist; dy /= dist;

      const edgePad = 40;
      const maxX = cx - edgePad, maxY = cy - edgePad;
      const scale = Math.min(maxX / (Math.abs(dx) || 0.01), maxY / (Math.abs(dy) || 0.01));
      const ax = cx + dx * scale;
      const ay = cy + dy * scale;

      const angle = Math.atan2(dy, dx) - Math.PI / 2;
      ballArrowEl.style.left = ax - 14 + "px";
      ballArrowEl.style.top = ay - 11 + "px";
      ballArrowEl.style.transform = "rotate(" + angle + "rad)";
      ballArrowEl.style.opacity = 0.85;
    }
  </script>
